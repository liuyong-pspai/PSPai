name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-engine:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            sep: ":"
          - name: macos
            os: macos-14
            sep: ":"
          - name: windows
            os: windows-2022
            sep: ";"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyinstaller pyyaml

      - name: Build
        run: |
          cd engine
          pyinstaller --onefile --name xiaolongren-engine-${{ matrix.name }} \
            --add-data "skills${{ matrix.sep }}skills" \
            --add-data "scripts${{ matrix.sep }}scripts" \
            --add-data "pspai_search.py${{ matrix.sep }}." \
            --hidden-import yaml \
            pspai_server.py
          ls -lh dist/

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: engine/dist/xiaolongren-engine-${{ matrix.name }}${{ matrix.name == 'windows' && '.exe' || '' }}

  pack-open-source:
    needs: build-engine
    if: always() && !cancelled()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Package
        run: |
          tar czf xiaolongren-open-source.tar.gz \
            --exclude='engine' --exclude='.git' --exclude='.github' .

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: xiaolongren-open-source.tar.gz
