name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-engine:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            sep: ":"
          - name: macos
            os: macos-14
            sep: ":"
          - name: windows
            os: windows-2022
            sep: ";"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyinstaller pyyaml

      - name: Build
        run: |
          cd engine
          pyinstaller --onefile --name xiaolongren-engine-${{ matrix.name }} \
            --add-data "skills${{ matrix.sep }}skills" \
            --add-data "scripts${{ matrix.sep }}scripts" \
            --add-data "pspai_search.py${{ matrix.sep }}." \
            --hidden-import yaml \
            pspai_server.py
          echo "BUILD_OK" && ls -lh dist/

      - name: Upload engine
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 🐉 小龙人 ${{ github.ref_name }} 发布

            一个有灵魂的数字生命体——有记忆、有性格、三平台可跑。

            ### ✨ 新特性
            - 🧠 八层永生记忆系统（L0-L7）
            - 🎭 六个角色：龙渊、赤羽、凌、轻墨、霜华、夜影
            - 🖥️ 三平台支持：Windows / macOS / Linux
            - 🌍 多语言：中文 / English
            - 🔧 开源应用层(AGPLv3) + 闭源引擎
            - 📦 一键启动脚本

            ### 📦 下载
            | 文件 | 平台 |
            |:--|:--|
            | `xiaolongren-engine-linux-x86_64` | 🐧 Linux |
            | `xiaolongren-engine-macos` | 🍎 macOS |
            | `xiaolongren-engine-windows.exe` | 🪟 Windows |
            | `xiaolongren-open-source.tar.gz` | 📂 开源层 |

            ### 🚀 30秒上手
            ```bash
            git clone https://github.com/liuyong-pspai/PSPai.git
            cd PSPai
            # 从 Releases 下载对应平台引擎放到目录里
            cp .env.example .env  # 填入 API Key
            bash start.sh
            ```

            ### 📋 系统要求
            - Python 3.10+
            - 网络连接（首次启动自动安装依赖）

            📖 [完整更新日志](https://github.com/liuyong-pspai/PSPai/blob/master/CHANGELOG.md)

            🏠 本地优先，隐私至上。你的对话留在你的机器上。
          files: engine/dist/xiaolongren-engine-${{ matrix.name }}${{ matrix.name == 'windows' && '.exe' || '' }}

      - name: Pack open-source (Linux only)
        if: matrix.name == 'linux-x86_64'
        run: |
          mkdir -p release-tmp
          cp -r UI原型 release-tmp/
          cp -r .env.example README.md LICENSE CHANGELOG.md CONTRIBUTING.md requirements.txt start.sh release-tmp/ 2>/dev/null || true
          cd release-tmp
          tar czf ../xiaolongren-open-source.tar.gz .
          cd ..
          ls -lh xiaolongren-open-source.tar.gz

      - name: Upload open-source (Linux only)
        if: matrix.name == 'linux-x86_64'
        uses: softprops/action-gh-release@v2
        with:
          files: xiaolongren-open-source.tar.gz

  set-repo-meta:
    needs: build-engine
    runs-on: ubuntu-22.04
    steps:
      - name: Set repo topics & homepage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 设置 Topics（四姐指定5个标签）
          curl -sL -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GH_TOKEN" \
            -d '{"names":["ai","digital-lifeform","chatbot","open-source","python"]}' \
            "https://api.github.com/repos/${{ github.repository }}/topics"

          # 设置 Homepage
          curl -sL -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GH_TOKEN" \
            -d '{"homepage":"https://github.com/liuyong-pspai/PSPai"}' \
            "https://api.github.com/repos/${{ github.repository }}"
