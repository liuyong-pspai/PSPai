name: Build 鸿蒙版 APK

on:
  push:
    paths:
      - 'hongmeng/**'
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Create Capacitor project
        run: |
          mkdir -p app-build
          cd app-build
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init 小龙人 com.pspai.xiaolongren --web-dir=www
          mkdir -p www

      - name: Copy 鸿蒙版 files
        run: |
          cp -r hongmeng/* app-build/www/
          ls -la app-build/www/

      - name: Add Android platform
        working-directory: app-build
        run: npx cap add android

      - name: Configure Android
        run: |
          # App name
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">小龙人<\/string>/' \
            app-build/android/app/src/main/res/values/strings.xml
          # Allow cleartext
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' \
            app-build/android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          # Custom icons
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp hongmeng/android-res/mipmap-${density}/ic_launcher.png app-build/android/app/src/main/res/mipmap-${density}/ic_launcher.png 2>/dev/null || true
            cp hongmeng/android-res/mipmap-${density}/ic_launcher_round.png app-build/android/app/src/main/res/mipmap-${density}/ic_launcher_round.png 2>/dev/null || true
          done
          # Remove adaptive icon XML
          rm -f app-build/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml 2>/dev/null || true
          rm -f app-build/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml 2>/dev/null || true
          # Network security
          mkdir -p app-build/android/app/src/main/res/xml
          cp hongmeng/android-res/xml/network_security_config.xml app-build/android/app/src/main/res/xml/ 2>/dev/null || true
          sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' \
            app-build/android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          # Kotlin fix
          cat >> app-build/android/app/build.gradle << 'GRADLEEOF'

          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          GRADLEEOF

      - name: Build APK
        working-directory: app-build/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-hongmeng-apk
          path: app-build/android/app/build/outputs/apk/debug/app-debug.apk
