name: Build APK (原生WebView)
on:
  push:
    paths: ['frontend/pwa/html/**', 'mobile/**', '.github/workflows/apk-build.yml']
    branches: [master]
  workflow_dispatch:
permissions:
  contents: write
  actions: write
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'
      - name: Build APK
        run: |
          set -e
          APP=app-build
          mkdir -p $APP/app/src/main/java/com/pspai/xiaolongren
          mkdir -p $APP/app/src/main/res/values
          mkdir -p $APP/app/src/main/assets/public
          # Copy web files
          cp -r frontend/pwa/html/* $APP/app/src/main/assets/public/
          cp $APP/app/src/main/assets/public/mobile.html $APP/app/src/main/assets/public/index.html
          rm -f $APP/app/src/main/assets/public/server.py
          # MainActivity.java from base64
          echo  | base64 -d > $APP/app/src/main/java/com/pspai/xiaolongren/MainActivity.java
          # AndroidManifest (single line to avoid heredoc issues)
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.pspai.xiaolongren"><uses-permission android:name="android.permission.INTERNET"/><application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round" android:label="@string/app_name" android:usesCleartextTraffic="true" android:theme="@style/AppTheme"><activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > $APP/app/src/main/AndroidManifest.xml
          # Resources
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">小龙人</string></resources>' > $APP/app/src/main/res/values/strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="AppTheme" parent="android:Theme.Material.NoActionBar"><item name="android:windowFullscreen">true</item></style></resources>' > $APP/app/src/main/res/values/themes.xml
          # Icons
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p $APP/app/src/main/res/mipmap-${d}
            cp ${{ github.workspace }}/mobile/android-app/res/mipmap-${d}/ic_launcher.png $APP/app/src/main/res/mipmap-${d}/ic_launcher.png
            cp ${{ github.workspace }}/mobile/android-app/res/mipmap-${d}/ic_launcher_round.png $APP/app/src/main/res/mipmap-${d}/ic_launcher_round.png
          done
          # Gradle
          echo 'buildscript { repositories { google(); mavenCentral() } dependencies { classpath "com.android.tools.build:gradle:8.2.0" } } allprojects { repositories { google(); mavenCentral() } }' > $APP/build.gradle
          echo 'apply plugin: "com.android.application" android { namespace "com.pspai.xiaolongren" compileSdk 34 defaultConfig { applicationId "com.pspai.xiaolongren" minSdk 23 targetSdk 34 versionCode 1 versionName "PSP3.4" } }' > $APP/app/build.gradle
          echo 'include ":app"' > $APP/settings.gradle
          echo 'rootProject.name = "XiaoLongRen"' >> $APP/settings.gradle
          echo 'org.gradle.jvmargs=-Xmx4g' > $APP/gradle.properties
          # Build APK
          cd $APP
          set -x  # debug
          # Check SDK
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          # Use sdkmanager gradle or check
          if command -v gradle &>/dev/null; then
            echo "Using system gradle"
            gradle assembleDebug --no-daemon --stacktrace 2>&1
          else
            echo "Gradle not found, downloading..."
            curl -sL --connect-timeout 30 --max-time 300 "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
            ls -lh /tmp/gradle.zip
            unzip -q -o /tmp/gradle.zip -d /tmp/gradle8
            /tmp/gradle8/gradle-8.5/bin/gradle assembleDebug --no-daemon --stacktrace 2>&1
          fi
          echo "=== RESULT ==="
          set +x
          find . -name "*.apk" -type f 2>/dev/null
          ls -lh app/build/outputs/apk/debug/app-debug.apk 2>/dev/null || echo "APK NOT FOUND"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-native-apk
          path: |
            app-build/app/build/outputs/apk/debug/app-debug.apk
            app-build/app/build/outputs/apk/debug/app-*.apk
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: PSP3.6
          files: app-build/app/build/outputs/apk/debug/app-debug.apk
          name: 小龙人 PSP3.4 原生WebView版
          body: |
            🔥 放弃Capacitor框架，原生Android壳+WebView
            兼容华为鸿蒙系统
          prerelease: true
          fail_on_unmatched_files: false
