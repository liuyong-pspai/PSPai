name: Build Installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ============================================================
  # Linux
  # ============================================================
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Linux Installer
        run: python3 installer/make_installer.py
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-linux
          path: dist/xiaolongren-installer.run

  # ============================================================
  # Windows
  # ============================================================
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows Installer
        run: python installer/make_installer.py
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-windows
          path: dist/xiaolongren-setup.zip

  # ============================================================
  # macOS
  # ============================================================
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build macOS Installer
        run: python3 installer/make_installer.py
      - name: Upload macOS Artifact (DMG)
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-macos
          path: dist/xiaolongren-installer.dmg
      - name: Upload macOS Artifact (ZIP fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-macos-zip
          path: dist/xiaolongren-macos.zip

  # ============================================================
  # Android APK
  # ============================================================
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Generate APK
        run: |
          cd frontend/pwa/html
          bubblewrap init --manifest manifest.json
          bubblewrap build
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-android
          path: frontend/pwa/html/app-release-signed.apk

  # ============================================================
  # GitHub Release
  # ============================================================
  release:
    needs: [linux, windows, macos, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            xiaolongren-linux/xiaolongren-installer.run
            xiaolongren-windows/xiaolongren-setup.zip
            xiaolongren-macos/*.dmg
            xiaolongren-macos-zip/*.zip
            xiaolongren-android/*.apk
          generate_release_notes: true
