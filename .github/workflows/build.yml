name: Build Installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ============================================================
  # Linux x86_64 — PyInstaller全功能引擎 + 安装包
  # ============================================================
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller hermes-agent PyYAML Pillow requests
      - name: Build engine (PyInstaller)
        run: |
          cd engine
          pyinstaller --clean xiaolongren-engine-linux-arm64.spec 2>/dev/null || \
          pyinstaller --onefile --add-data "config.yaml:." --add-data "SOUL.md:." \
            --add-data "MEMORY.md:." --add-data "skills:skills" \
            --add-data "pspai_search.py:." --name xiaolongren-engine-linux-x86_64 \
            --hidden-import yaml --hidden-import run_agent pspai_server.py
      - name: Build Linux Installer
        run: python3 installer/make_installer.py
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-linux
          path: dist/xiaolongren-installer.run

  # ============================================================
  # Windows — PyInstaller全功能引擎 + 安装包
  # ============================================================
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller hermes-agent PyYAML Pillow requests
      - name: Build engine (PyInstaller)
        run: |
          cd engine
          pyinstaller --onefile --add-data "config.yaml;." --add-data "SOUL.md;." `
            --add-data "MEMORY.md;." --add-data "skills;skills" `
            --add-data "pspai_search.py;." --name xiaolongren-engine-windows `
            --hidden-import yaml --hidden-import run_agent pspai_server.py
      - name: Build Windows Installer
        run: python installer/make_installer.py
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-windows
          path: dist/xiaolongren-setup.zip

  # ============================================================
  # macOS — PyInstaller全功能引擎 + 安装包
  # ============================================================
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller hermes-agent PyYAML Pillow requests
      - name: Build engine (PyInstaller)
        run: |
          cd engine
          pyinstaller --onefile --add-data "config.yaml:." --add-data "SOUL.md:." \
            --add-data "MEMORY.md:." --add-data "skills:skills" \
            --add-data "pspai_search.py:." --name xiaolongren-engine-macos \
            --hidden-import yaml --hidden-import run_agent pspai_server.py
      - name: Build macOS Installer
        run: python3 installer/make_installer.py
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-macos
          path: dist/xiaolongren-installer.dmg
      - name: Upload macOS ZIP (fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-macos-zip
          path: dist/xiaolongren-macos.zip

  # ============================================================
  # Android APK
  # ============================================================
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Generate APK
        run: |
          cd frontend/pwa/html
          bubblewrap init --manifest manifest.json
          bubblewrap build
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-android
          path: frontend/pwa/html/app-release-signed.apk

  # ============================================================
  # GitHub Release
  # ============================================================
  release:
    needs: [linux, windows, macos, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            xiaolongren-linux/xiaolongren-installer.run
            xiaolongren-windows/xiaolongren-setup.zip
            xiaolongren-macos/*.dmg
            xiaolongren-macos-zip/*.zip
            xiaolongren-android/*.apk
          generate_release_notes: true
