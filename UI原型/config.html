<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 小龙人 · 配置向导</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.container {
  max-width: 520px;
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 40px 32px;
  backdrop-filter: blur(20px);
}
h1 { font-size: 28px; text-align: center; margin-bottom: 8px; }
.subtitle { text-align: center; color: #888; margin-bottom: 32px; font-size: 14px; }

/* 步骤指示器 */
.steps { display: flex; justify-content: center; gap: 8px; margin-bottom: 32px; }
.step { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.06); 
  display: flex; align-items: center; justify-content: center; font-size: 14px; 
  color: #666; transition: all 0.3s; }
.step.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.step.done { background: #22c55e; color: white; }
.step-line { width: 24px; height: 2px; background: rgba(255,255,255,0.08); align-self: center; }

/* 卡片面板 */
.panel { display: none; }
.panel.active { display: block; }

/* Provider卡片 */
.provider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.provider-card {
  padding: 16px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03); cursor: pointer; transition: all 0.2s;
  text-align: center;
}
.provider-card:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }
.provider-card.selected { border-color: #667eea; background: rgba(102,126,234,0.12); }
.provider-card .name { font-size: 16px; font-weight: 600; margin: 4px 0; }
.provider-card .info { font-size: 12px; color: #888; }
.provider-card .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; 
  font-size: 11px; margin-top: 6px; }
.tag-free { background: rgba(34,197,94,0.15); color: #22c55e; }
.tag-cheap { background: rgba(250,204,21,0.15); color: #facc15; }
.tag-power { background: rgba(239,68,68,0.15); color: #ef4444; }

/* 表单 */
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
.form-group input, .form-group select {
  width: 100%; padding: 12px 16px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
  color: #e0e0e0; font-size: 14px; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus {
  outline: none; border-color: #667eea;
}
.form-group select { appearance: none; cursor: pointer; }
.form-group select option { background: #1a1a2e; color: #e0e0e0; }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; }
.input-row button {
  padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04); color: #aaa; cursor: pointer;
  font-size: 13px; transition: all 0.2s;
}
.input-row button:hover { background: rgba(255,255,255,0.1); }

/* 角色选择 */
.character-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.char-card {
  padding: 12px 8px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03); cursor: pointer; text-align: center;
  transition: all 0.2s;
}
.char-card:hover { border-color: rgba(255,255,255,0.15); }
.char-card.selected { border-color: #667eea; background: rgba(102,126,234,0.12); }
.char-card .emoji { font-size: 32px; margin-bottom: 4px; }
.char-card .cname { font-size: 14px; font-weight: 600; }
.char-card .cdesc { font-size: 11px; color: #888; }

/* 按钮 */
.btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(102,126,234,0.3); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary { background: rgba(255,255,255,0.06); color: #aaa; margin-top: 12px; }
.btn-secondary:hover { background: rgba(255,255,255,0.1); }
.btn-row { display: flex; gap: 12px; margin-top: 24px; }
.btn-row .btn { flex: 1; }

/* 状态 */
.status { text-align: center; margin-top: 16px; font-size: 14px; color: #22c55e; }
.status.error { color: #ef4444; }
.hidden { display: none; }
.note { font-size: 12px; color: #666; margin-top: 8px; text-align: center; }

/* 语言切换 */
.lang-switch { position: fixed; top: 16px; right: 16px; }
.lang-switch button {
  padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04); color: #888; cursor: pointer; font-size: 12px;
}
.lang-switch button:hover { color: #e0e0e0; }
.lang-switch button.active { background: rgba(102,126,234,0.2); color: #667eea; border-color: #667eea; }
</style>
</head>
<body>

<div class="lang-switch">
  <button onclick="setLang('zh')" id="btn-zh" class="active">中文</button>
  <button onclick="setLang('en')" id="btn-en">EN</button>
</div>

<div class="container">
  <h1>🐉 小龙人</h1>
  <p class="subtitle" id="subtitle">三步配置，即刻开始</p>

  <div class="steps">
    <div class="step active" id="step1">1</div>
    <div class="step-line"></div>
    <div class="step" id="step2">2</div>
    <div class="step-line"></div>
    <div class="step" id="step3">3</div>
  </div>

  <!-- ====== 第一步：选择模型 ====== -->
  <div class="panel active" id="panel-model">
    <p style="margin-bottom:16px;color:#aaa;font-size:14px;" id="model-desc">选择AI模型提供商</p>
    <div class="provider-grid" id="provider-grid">
      <!-- JS动态生成 -->
    </div>
    <div class="form-group">
      <label for="apiKey" id="label-key">🔑 API Key</label>
      <div class="input-row">
        <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
        <button onclick="toggleKey()" id="btn-toggle">👁</button>
      </div>
      <p class="note" id="note-key">密钥仅存储在您的电脑上，不会上传</p>
    </div>
    <div class="form-group" id="group-model">
      <label for="modelSelect" id="label-model">🤖 模型</label>
      <select id="modelSelect"></select>
    </div>
    <div class="form-group hidden" id="group-baseurl">
      <label for="baseUrl">🔗 自定义API地址 (可选)</label>
      <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1">
    </div>
    <button class="btn btn-primary" onclick="nextStep()" id="btn-next-model">下一步 →</button>
  </div>

  <!-- ====== 第二步：选择角色 ====== -->
  <div class="panel" id="panel-character">
    <p style="margin-bottom:16px;color:#aaa;font-size:14px;" id="char-desc">选择一个数字生命体</p>
    <div class="character-grid" id="character-grid">
      <!-- JS动态生成 -->
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="prevStep()">← 上一步</button>
      <button class="btn btn-primary" onclick="nextStep()" id="btn-next-char">下一步 →</button>
    </div>
  </div>

  <!-- ====== 第三步：确认完成 ====== -->
  <div class="panel" id="panel-done">
    <div style="text-align:center;padding:32px 0;">
      <div style="font-size:64px;margin-bottom:16px;">✅</div>
      <p style="font-size:18px;font-weight:600;margin-bottom:8px;" id="done-title">配置完成！</p>
      <p style="color:#888;font-size:14px;margin-bottom:24px;" id="done-desc">
        点击下方按钮进入小龙人
      </p>
      <div id="config-summary" style="text-align:left;background:rgba(255,255,255,0.04);border-radius:12px;padding:16px;margin-bottom:24px;font-size:13px;">
        <!-- JS动态生成 -->
      </div>
      <button class="btn btn-primary" onclick="saveAndLaunch()" id="btn-launch">
        🚀 保存并开始
      </button>
    </div>
  </div>

  <div class="status hidden" id="status"></div>
</div>

<script>
// ============================================================
// 国际化
// ============================================================
const i18n = {
  zh: {
    subtitle: '三步配置，即刻开始',
    modelDesc: '选择AI模型提供商',
    labelKey: '🔑 API Key',
    placeholderKey: 'sk-...',
    noteKey: '密钥仅存储在您的电脑上，不会上传',
    labelModel: '🤖 模型',
    charDesc: '选择一个数字生命体',
    doneTitle: '配置完成！',
    doneDesc: '点击下方按钮进入小龙人',
    saving: '保存中...',
    saveOk: '✅ 配置已保存，启动中...',
    saveErr: '保存失败，请检查启动器是否在运行',
    launch: '🚀 保存并开始',
    providerNames: { deepseek: 'DeepSeek', openai: 'OpenAI', anthropic: 'Anthropic', moonshot: 'Moonshot月之暗面', zhipu: '智谱GLM', qwen: '通义千问', custom: '自定义' },
    stepLabels: ['模型', '角色', '完成'],
    free: '免费额度',
    cheap: '¥1/百万token',
    power: '最强模型',
    customUrl: '自定义地址',
  },
  en: {
    subtitle: '3-step setup, start chatting instantly',
    modelDesc: 'Choose AI provider',
    labelKey: '🔑 API Key',
    placeholderKey: 'sk-...',
    noteKey: 'Your key stays on your computer, never uploaded',
    labelModel: '🤖 Model',
    charDesc: 'Choose a digital companion',
    doneTitle: 'All set!',
    doneDesc: 'Click below to enter XiaoLongRen',
    saving: 'Saving...',
    saveOk: '✅ Saved! Starting...',
    saveErr: 'Save failed. Is the launcher running?',
    launch: '🚀 Save & Launch',
    providerNames: { deepseek: 'DeepSeek', openai: 'OpenAI', anthropic: 'Anthropic', moonshot: 'Moonshot', zhipu: 'Zhipu GLM', qwen: 'Qwen', custom: 'Custom' },
    stepLabels: ['Model', 'Character', 'Done'],
    free: 'Free tier',
    cheap: '$0.14/M tokens',
    power: 'Most capable',
    customUrl: 'Custom URL',
  }
};

let lang = 'zh';
function t(key) { return i18n[lang][key] || key; }
function setLang(l) {
  lang = l;
  document.getElementById('btn-zh').classList.toggle('active', l==='zh');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  render();
}

// ============================================================
// Provider数据
// ============================================================
const providers = [
  { id: 'deepseek',   models: ['deepseek-chat', 'deepseek-reasoner'], tag: 'free',   defaultModel: 'deepseek-chat' },
  { id: 'openai',     models: ['gpt-4o', 'gpt-4o-mini', 'gpt-4.1'],    tag: 'power',  defaultModel: 'gpt-4o-mini' },
  { id: 'anthropic',  models: ['claude-sonnet-4-20250514', 'claude-haiku-3.5'], tag: 'power', defaultModel: 'claude-haiku-3.5' },
  { id: 'moonshot',   models: ['moonshot-v1-8k', 'moonshot-v1-32k'],   tag: 'cheap',  defaultModel: 'moonshot-v1-8k' },
  { id: 'zhipu',      models: ['glm-4-flash', 'glm-4-plus'],           tag: 'free',   defaultModel: 'glm-4-flash' },
  { id: 'qwen',       models: ['qwen-turbo', 'qwen-plus', 'qwen-max'], tag: 'cheap',  defaultModel: 'qwen-turbo' },
  { id: 'custom',     models: [], tag: '', defaultModel: '', customUrl: true },
];

const characters = [
  { id: 'longyuan',  emoji: '🐉', name: '龙渊', desc: '威严的龙族智者' },
  { id: 'chiyu',     emoji: '🔥', name: '赤羽', desc: '热情的火凤战士' },
  { id: 'ling',      emoji: '💧', name: '凌',   desc: '冷静的冰系法师' },
  { id: 'qingmo',    emoji: '🌿', name: '轻墨', desc: '温雅的文人墨客' },
  { id: 'shuanghua', emoji: '❄️', name: '霜华', desc: '高冷的雪域公主' },
  { id: 'yeying',    emoji: '🌙', name: '夜影', desc: '神秘的暗夜行者' },
];

// 用户选择（内存中）
let selectedProvider = 'deepseek';
let selectedModel = 'deepseek-chat';
let selectedCharacter = 'longyuan';
let apiKey = '';
let currentStep = 0;

// ============================================================
// 渲染
// ============================================================
function render() {
  const tdata = i18n[lang];
  
  // 标题
  document.getElementById('subtitle').textContent = tdata.subtitle;
  
  // 步骤标签
  document.querySelectorAll('.step').forEach((el,i) => {
    if (i < 3) el.textContent = (i+1) + '. ' + tdata.stepLabels[i];
  });
  
  // Provider卡片
  const grid = document.getElementById('provider-grid');
  grid.innerHTML = providers.map(p => `
    <div class="provider-card ${selectedProvider === p.id ? 'selected' : ''}" 
         onclick="selectProvider('${p.id}')" id="card-${p.id}">
      <div class="name">${tdata.providerNames[p.id] || p.id}</div>
      <div class="info">${p.models.slice(0,2).join(' / ') || tdata.customUrl}</div>
      ${p.tag ? `<span class="tag tag-${p.tag}">${tdata[p.tag] || p.tag}</span>` : ''}
    </div>
  `).join('');
  
  // Model选择
  const pdata = providers.find(p => p.id === selectedProvider);
  const sel = document.getElementById('modelSelect');
  if (pdata && pdata.models.length > 0) {
    sel.innerHTML = pdata.models.map(m => 
      `<option value="${m}" ${m === selectedModel ? 'selected' : ''}>${m}</option>`
    ).join('');
    document.getElementById('group-model').classList.remove('hidden');
    if (!pdata.models.includes(selectedModel)) {
      selectedModel = pdata.defaultModel;
      sel.value = selectedModel;
    }
  } else {
    document.getElementById('group-model').classList.add('hidden');
  }
  
  // 自定义URL
  document.getElementById('group-baseurl').classList.toggle('hidden', !pdata || !pdata.customUrl);
  
  // 标签翻译
  document.getElementById('label-key').textContent = tdata.labelKey;
  document.getElementById('label-model').textContent = tdata.labelModel;
  document.getElementById('note-key').textContent = tdata.noteKey;
  document.getElementById('model-desc').textContent = tdata.modelDesc;
  document.getElementById('char-desc').textContent = tdata.charDesc;
  document.getElementById('done-title').textContent = tdata.doneTitle;
  document.getElementById('done-desc').textContent = tdata.doneDesc;
  document.getElementById('btn-launch').textContent = tdata.launch;
  document.getElementById('btn-next-model').textContent = '下一步 →';
  document.getElementById('btn-next-char').textContent = '下一步 →';
  
  // 角色卡片
  const cgrid = document.getElementById('character-grid');
  cgrid.innerHTML = characters.map(c => `
    <div class="char-card ${selectedCharacter === c.id ? 'selected' : ''}"
         onclick="selectCharacter('${c.id}')">
      <div class="emoji">${c.emoji}</div>
      <div class="cname">${c.name}</div>
      <div class="cdesc">${c.desc}</div>
    </div>
  `).join('');
  
  // 确认页摘要
  const summary = document.getElementById('config-summary');
  if (summary) {
    const provName = tdata.providerNames[selectedProvider] || selectedProvider;
    const charData = characters.find(c => c.id === selectedCharacter);
    summary.innerHTML = `
      <div style="margin-bottom:8px;">🔌 <strong>${provName}</strong> · ${selectedModel || '自定义'}</div>
      <div style="margin-bottom:8px;">🔑 ${apiKey ? '●●●●' + apiKey.slice(-4) : '(未设置)'}</div>
      <div>${charData?.emoji || ''} <strong>${charData?.name || selectedCharacter}</strong> · ${charData?.desc || ''}</div>
    `;
  }
  
  updateStepUI();
}

function updateStepUI() {
  // 步骤指示器
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('step'+i);
    el.classList.remove('active', 'done');
    if (i < currentStep + 1) el.classList.add('done');
    if (i === currentStep + 1) el.classList.add('active');
  }
  
  // 面板
  const panels = ['panel-model', 'panel-character', 'panel-done'];
  panels.forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === currentStep);
  });
}

function selectProvider(id) {
  selectedProvider = id;
  const pdata = providers.find(p => p.id === id);
  selectedModel = pdata ? pdata.defaultModel : '';
  render();
}

function selectCharacter(id) {
  selectedCharacter = id;
  render();
}

function toggleKey() {
  const inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function nextStep() {
  // 验证第一步
  if (currentStep === 0) {
    apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) {
      showStatus('请填写 API Key', 'error');
      return;
    }
    selectedModel = document.getElementById('modelSelect').value || selectedModel;
    const baseUrl = document.getElementById('baseUrl').value.trim();
    if (baseUrl) {
      window._customBaseUrl = baseUrl;
    }
  }
  if (currentStep < 2) {
    currentStep++;
    render();
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    render();
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (type || '');
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 5000);
}

async function saveAndLaunch() {
  const btn = document.getElementById('btn-launch');
  btn.disabled = true;
  btn.textContent = i18n[lang].saving;
  
  const baseUrl = window._customBaseUrl || document.getElementById('baseUrl')?.value?.trim() || '';
  
  const config = {
    provider: selectedProvider,
    model: selectedModel,
    api_key: apiKey,
    base_url: baseUrl,
    character: selectedCharacter,
    language: lang,
    configured_at: new Date().toISOString(),
  };
  
  try {
    // 保存到本地存储（备用）
    localStorage.setItem('xiaolongren_config', JSON.stringify(config));
    
    // 通过API写文件（由launcher.py提供）
    const resp = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    });
    
    if (resp.ok) {
      showStatus(i18n[lang].saveOk, '');
      // 延迟跳转，让用户看到成功提示
      setTimeout(() => {
        window.location.href = '/';
      }, 2000);
    } else {
      throw new Error('API返回 ' + resp.status);
    }
  } catch (err) {
    console.error('保存失败:', err);
    showStatus(i18n[lang].saveErr, 'error');
    btn.disabled = false;
    btn.textContent = i18n[lang].launch;
    
    // 降级方案：如果API不可用，显示手动保存提示
    document.getElementById('config-summary').insertAdjacentHTML('beforeend', 
      '<div style="margin-top:12px;padding:12px;background:rgba(239,68,68,0.1);border-radius:8px;font-size:12px;color:#ef4444;">' +
      '⚠️ API不可用，请<a href="#" onclick="downloadConfig()" style="color:#667eea;">下载配置文件</a>放到小龙人目录下' +
      '</div>');
  }
}

function downloadConfig() {
  const config = {
    provider: selectedProvider,
    model: selectedModel,
    api_key: apiKey,
    character: selectedCharacter,
    language: lang,
  };
  const blob = new Blob([JSON.stringify(config, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'config.json';
  a.click();
  URL.revokeObjectURL(url);
}

// 恢复之前的选择
function restoreState() {
  const saved = localStorage.getItem('xiaolongren_config');
  if (saved) {
    try {
      const cfg = JSON.parse(saved);
      if (cfg.provider) selectedProvider = cfg.provider;
      if (cfg.model) selectedModel = cfg.model;
      if (cfg.character) selectedCharacter = cfg.character;
      if (cfg.api_key) apiKey = cfg.api_key;
      if (cfg.language) lang = cfg.language;
    } catch(e) {}
  }
}

// 初始化
restoreState();
render();
document.getElementById('apiKey').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') nextStep();
});
</script>
</body>
</html>
