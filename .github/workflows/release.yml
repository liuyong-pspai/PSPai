name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ============================================================
  # 三平台引擎构建
  # ============================================================
  build-engine:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            sep: ":"
          - name: macos
            os: macos-14
            sep: ":"
          - name: windows
            os: windows-2022
            sep: ";"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyinstaller pyyaml hermes-agent

      - name: Build engine
        run: |
          cd engine
          pyinstaller --onefile --name xiaolongren-engine-${{ matrix.name }} \
            --add-data "skills${{ matrix.sep }}skills" \
            --add-data "config.yaml${{ matrix.sep }}." \
            --add-data "SOUL.md${{ matrix.sep }}." \
            --add-data "MEMORY.md${{ matrix.sep }}." \
            --add-data "pspai_search.py${{ matrix.sep }}." \
            --hidden-import yaml --hidden-import run_agent \
            --hidden-import hermes_cli --hidden-import hermes_cli.config \
            --hidden-import hermes_cli.models --hidden-import tools.registry \
            --collect-all hermes_cli --collect-all tools \
            pspai_server.py
          echo "BUILD_OK" && ls -lh dist/

      - name: Upload engine artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.name }}
          path: engine/dist/xiaolongren-engine-${{ matrix.name }}${{ matrix.name == 'windows' && '.exe' || '' }}
          retention-days: 1

      - name: Upload engine to Release
        uses: softprops/action-gh-release@v2
        with:
          files: engine/dist/xiaolongren-engine-${{ matrix.name }}${{ matrix.name == 'windows' && '.exe' || '' }}

  # ============================================================
  # 三平台一键安装包构建（每个平台跑自己的构建器）
  # ============================================================
  build-installer:
    needs: build-engine
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-2022
            artifact: engine-windows
            engine_src: xiaolongren-engine-windows.exe
            engine_dest: xiaolongren-engine-windows.exe
            output: xiaolongren-setup.zip
            ext: .zip
          - platform: macos
            os: macos-14
            artifact: engine-macos
            engine_src: xiaolongren-engine-macos
            engine_dest: xiaolongren-engine-macos
            output: xiaolongren-installer.dmg
            ext: .dmg
          - platform: linux
            os: ubuntu-22.04
            artifact: engine-linux-x86_64
            engine_src: xiaolongren-engine-linux-x86_64
            engine_dest: xiaolongren-engine-linux-x86_64
            output: xiaolongren-installer.run
            ext: .run
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download engine artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: engine/dist/

      - name: Verify files
        run: |
          echo "=== Engine ==="
          ls -lh engine/dist/ || echo "Engine not found!"
          echo "=== Frontend ==="
          ls frontend/pwa/html/ | head -10
          echo "=== Launcher ==="
          ls -lh launcher.py

      - name: Build installer (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $BUILD = "xlr_build"
          New-Item -ItemType Directory -Force -Path $BUILD, dist
          Copy-Item -Recurse "frontend/pwa/html/*" "$BUILD/frontend/"
          Copy-Item "launcher.py" "$BUILD/"
          Copy-Item "engine/dist/xiaolongren-engine-windows.exe" "$BUILD/xiaolongren-engine.exe"
          # Create install.bat (CRLF for Windows)
          $bat = @"
          @echo off
          chcp 65001 >nul
          title XiaoLongRen Setup v1.3.4
          echo ============================================
          echo    XiaoLongRen Setup
          echo ============================================
          echo.
          set "D=%%USERPROFILE%%\XiaoLongRen"
          echo [1/4] Checking Python...
          python --version >nul 2>&1
          if %%ERRORLEVEL%% NEQ 0 (
            echo Python not found. Please install Python 3.10+
            echo Download: https://www.python.org/downloads/
            pause
            exit /b 1
          )
          echo [2/4] Copying files to %%D%%...
          if not exist "%%D%%" mkdir "%%D%%"
          xcopy /E /I /Y /Q "frontend" "%%D%%\frontend" >nul
          copy /Y "launcher.py" "%%D%%\" >nul
          copy /Y "xiaolongren-engine.exe" "%%D%%\" >nul
          echo [3/4] Installing dependencies...
          cd /d "%%D%%"
          python -m pip install -q PyYAML Pillow requests >nul 2>&1
          echo [4/4] Launching...
          start "" python "%%D%%\launcher.py"
          echo.
          echo    Done. Browser opens for model setup.
          echo    Close this window to stop XiaoLongRen.
          timeout /t 5 >nul
          exit
          "@ -replace "`n","`r`n"
          [System.IO.File]::WriteAllText("$BUILD\install.bat", $bat)
          Compress-Archive -Path "$BUILD/*" -DestinationPath "dist/xiaolongren-setup.zip"
          echo "=== dist contents ==="
          Get-ChildItem dist/

      - name: Build installer (macOS/Linux)
        if: matrix.platform != 'windows'
        run: python3 installer/make_installer.py

      - name: List output
        run: |
          echo "=== Installer output ==="
          ls -lh dist/

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.output }}
            dist/xiaolongren-${{ matrix.platform }}-portable.zip
          fail_on_unmatched_files: false

  # ============================================================
  # Android APK 构建（PWA → 原生APP）
  # ============================================================
  build-apk:
    needs: pack-open-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Create Capacitor project
        run: |
          mkdir -p app-build && cd app-build
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init 小龙人 com.pspai.xiaolongren --web-dir=www

      - name: Copy PWA files
        run: |
          cp -r frontend/pwa/html/* app-build/www/
          # Remove unnecessary files
          rm -f app-build/www/sw.js  # Service worker conflicts with Capacitor

      - name: Add Android platform
        working-directory: app-build
        run: npx cap add android

      - name: Configure Android build
        run: |
          # Set app name
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">小龙人<\/string>/' \
            app-build/android/app/src/main/res/values/strings.xml
          # Allow cleartext for local dev
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' \
            app-build/android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          # Replace default Capacitor icons with 小龙人 icons
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp android-app/res/mipmap-${density}/ic_launcher.png app-build/android/app/src/main/res/mipmap-${density}/ic_launcher.png
            cp android-app/res/mipmap-${density}/ic_launcher_round.png app-build/android/app/src/main/res/mipmap-${density}/ic_launcher_round.png 2>/dev/null || true
          done
          # Remove adaptive icon XML so Android uses our PNG icons
          rm -f app-build/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml 2>/dev/null || true
          rm -f app-build/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml 2>/dev/null || true
          rm -f app-build/android/app/src/main/res/drawable/ic_launcher_foreground.xml 2>/dev/null || true
          # Network security config for API access
          cp android-app/res/xml/network_security_config.xml app-build/android/app/src/main/res/xml/
          sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' \
            app-build/android/app/src/main/AndroidManifest.xml
          # Fix Kotlin stdlib duplicate class conflict (Capacitor v8 known issue)
          cat >> app-build/android/app/build.gradle << 'GRADLEEOF'

          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          GRADLEEOF

      - name: Build APK
        working-directory: app-build/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-debug
          path: app-build/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app-build/android/app/build/outputs/apk/debug/app-debug.apk

  # ============================================================
  # 打包开源应用层
  # ============================================================
  pack-open-source:
    needs: build-engine
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Pack open-source
        run: |
          mkdir -p release-tmp
          cp -r frontend/pwa/html release-tmp/
          cp -r installer release-tmp/
          cp launcher.py release-tmp/
          cp .env.example README.md LICENSE CHANGELOG.md CONTRIBUTING.md requirements.txt start.sh release-tmp/ 2>/dev/null || true
          cd release-tmp
          tar czf ../xiaolongren-open-source.tar.gz .
          cd ..
          ls -lh xiaolongren-open-source.tar.gz

      - name: Upload open-source
        uses: softprops/action-gh-release@v2
        with:
          files: xiaolongren-open-source.tar.gz

  # ============================================================
  # 仓库元数据
  # ============================================================
  set-repo-meta:
    needs: [build-engine, build-installer, pack-open-source]
    if: always() && !cancelled()
    runs-on: ubuntu-22.04
    steps:
      - name: Set repo topics & homepage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sL -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GH_TOKEN" \
            -d '{"names":["ai","digital-lifeform","chatbot","open-source","python"]}' \
            "https://api.github.com/repos/${{ github.repository }}/topics"

          curl -sL -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GH_TOKEN" \
            -d '{"homepage":"https://github.com/liuyong-pspai/PSPai"}' \
            "https://api.github.com/repos/${{ github.repository }}"
