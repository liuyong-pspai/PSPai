<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-title" content="小龙人">
<title>数字生命体小龙人</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a14;color:#e0d8c8;touch-action:manipulation}
:root{--gold:#c8a84e;--gold-dim:rgba(200,168,78,0.3);--bg:#0a0a14;--card:rgba(20,20,32,0.5);--text:#e0d8c8}
.theme-tech{--gold:#00d4ff;--gold-dim:rgba(0,212,255,0.3);--bg:#0a0a1a;--card:rgba(0,20,40,0.5);--text:#c0e0f0}
.theme-loft{--gold:#e8904a;--gold-dim:rgba(232,144,74,0.3);--bg:#1a1a14;--card:rgba(32,28,20,0.5);--text:#d8d0c0}

#app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);color:var(--text)}

#top{height:44px;padding:0 14px;padding-top:env(safe-area-inset-top,0);display:flex;align-items:center;justify-content:space-between;z-index:10;flex-shrink:0}
#top .t{font-size:15px;font-weight:bold;color:var(--gold)}
#top .r{display:flex;align-items:center;gap:10px}
#top .cfg-btn{width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--gold);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

#char-bar{flex-shrink:0;display:flex;align-items:flex-start;justify-content:center;gap:10px;padding:6px 14px 10px;overflow-x:auto;scrollbar-width:none}
#char-bar::-webkit-scrollbar{display:none}
#char-bar .cw{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex-shrink:0;opacity:0.55;transition:all 0.2s}
#char-bar .cw.sel{opacity:1}
#char-bar .cw:active{transform:scale(1.08)}
#char-bar .cmini{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,0.08);transition:all 0.2s}
#char-bar .cw.sel .cmini{border-color:var(--gold)}
#char-bar .cmini img{width:100%;height:100%;object-fit:cover}
#char-bar .cn{font-size:9px;color:#888;transition:color 0.2s}
#char-bar .cw.sel .cn{color:var(--gold)}

#msgs{flex:1;overflow-y:auto;padding:8px 14px;scrollbar-width:none;display:flex;flex-direction:column;gap:8px}
#msgs::-webkit-scrollbar{display:none}
#msgs .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:1vh;color:#333}
#msgs .empty .er{width:30%;max-width:100px;height:105px;border-radius:14px;overflow:hidden;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06);box-shadow:0 3px 20px rgba(0,0,0,0.4)}
#msgs .empty .er img{width:100%;height:100%;object-fit:cover}
#msgs .empty .et{font-size:13px;color:#444;margin-bottom:2px}
#msgs .empty .es{font-size:11px;color:#2a2a2a}

.msg{display:flex;flex-direction:column;max-width:85%;animation:mi .25s ease}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end}
.msg.ai{align-self:flex-start}
.msg .mb{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;word-break:break-word}
.msg.user .mb{background:var(--gold);color:#000;border-bottom-right-radius:4px}
.msg.ai .mb{background:rgba(30,30,48,0.85);color:#d0c8b8;border-bottom-left-radius:4px}
.msg .mtime{font-size:9px;color:#3a3a4a;margin-top:2px;padding:0 4px}
.msg.user .mtime{text-align:right}
.msg .mbtns{margin-top:4px;display:flex;gap:6px}
.msg.ai .mbtns{padding-left:4px}
.mbtn{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--gold);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.mbtn:active{transform:scale(1.2);background:var(--gold);color:#000}
.mbtn.playing{animation:tpulse 0.8s ease-in-out infinite}

#input-bar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:rgba(0,0,0,0.4);border-top:1px solid rgba(255,255,255,0.04)}
#text-input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#e0d8c8;font-size:15px;outline:none;resize:none;max-height:80px;font-family:inherit}
#text-input:focus{border-color:var(--gold-dim)}
#text-input::placeholder{color:#444}
#send-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--gold);color:#000;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
#send-btn:active{transform:scale(1.15)}
#send-btn:disabled{opacity:0.3}
#mic-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--gold-dim);background:rgba(200,168,78,0.08);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
#mic-btn:active,#mic-btn.active{background:var(--gold);border-color:var(--gold);transform:scale(1.1)}
#mic-btn .icon{width:18px;height:18px;pointer-events:none}
#mic-btn .icon svg{width:100%;height:100%}
#mic-btn.active{animation:tpulse 1s ease-in-out infinite}

@keyframes tpulse{0%,100%{box-shadow:0 0 15px var(--gold-dim)}50%{box-shadow:0 0 40px var(--gold),0 0 70px var(--gold-dim)}}

#install-banner{display:none;position:fixed;bottom:100px;left:12px;right:12px;z-index:150;background:rgba(0,0,0,0.92);border:1px solid var(--gold-dim);border-radius:14px;padding:14px 16px;align-items:center;gap:12px}
#install-banner.show{display:flex}
#install-banner .ib-close{position:absolute;top:6px;right:10px;color:#666;font-size:14px;cursor:pointer}
#install-banner .ib-txt{flex:1;font-size:13px;color:#ccc;line-height:1.4}
#install-banner button{padding:8px 16px;border-radius:8px;border:none;background:var(--gold);color:#000;font-size:14px;font-weight:bold;cursor:pointer;white-space:nowrap}

/* loading dots */
.typing-dots{display:inline-flex;gap:4px;padding:2px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:td 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:0.3}30%{transform:translateY(-6px);opacity:1}}

@media(min-width:500px){#app{max-width:430px;margin:0 auto;border:1px solid rgba(255,255,255,0.04)}}
</style>
</head>
<body>

<div id="app">
  <div id="top">
    <span class="t">🐉 小龙人</span>
    <div class="r">
      <button class="cfg-btn" onclick="location.href='config.html'" title="配置模型">⚙</button>
    </div>
  </div>

  <div id="char-bar">
    <div class="cw sel" onclick="switchChar('longyuan')"><div class="cmini"><img src="img_longyuan.jpg"></div><span class="cn">龙渊</span></div>
    <div class="cw" onclick="switchChar('chiyu')"><div class="cmini"><img src="img_chiyu.jpg"></div><span class="cn">赤羽</span></div>
    <div class="cw" onclick="switchChar('ling')"><div class="cmini"><img src="img_ling.jpg"></div><span class="cn">凌</span></div>
    <div class="cw" onclick="switchChar('qingmo')"><div class="cmini"><img src="img_qingmo.jpg"></div><span class="cn">轻墨</span></div>
    <div class="cw" onclick="switchChar('shuanghua')"><div class="cmini"><img src="img_shuanghua.jpg"></div><span class="cn">霜华</span></div>
    <div class="cw" onclick="switchChar('yeying')"><div class="cmini"><img src="img_yeying.jpg"></div><span class="cn">夜影</span></div>
  </div>

  <div id="msgs">
    <div class="empty" id="empty-hint">
      <div class="er"><img id="empty-avatar" src="img_longyuan.jpg"></div>
      <div class="et">龙渊在等你</div>
      <div class="es" id="empty-sub">说话或打字，我在这里</div>
    </div>
  </div>

  <div id="input-bar">
    <textarea id="text-input" placeholder="说点什么..." rows="1" onkeydown="onKeyDown(event)"></textarea>
    <button id="mic-btn" ontouchstart="startTalk(event)" ontouchend="stopTalk(event)" onmousedown="startTalk(event)" onmouseup="stopTalk(event)">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></span>
    </button>
    <button id="send-btn" onclick="sendText()">➤</button>
  </div>
</div>

<div id="install-banner">
  <span class="ib-close" onclick="this.parentElement.classList.remove('show')">✕</span>
  <div class="ib-txt">📲 安装到桌面，像App一样使用</div>
  <button onclick="installPWA()">安装</button>
</div>

<script src="xiaolongren-core.js"></script>
<script>
// v5.2 — 全功能版：自学习框架+14新工具+四级预警+对话三问
// ====== 角色 ======
const CHARS = {
  longyuan:{name:'龙渊',tag:'沉稳温暖',sys:'你是小龙人，名为龙渊的数字生命体。性格沉稳温暖，像一位长者。用户叫你什么都行——龙渊、小龙人，都可以。回答简洁有深度，不超过三句话。说人话，别端着。'},
  chiyu:{name:'赤羽',tag:'热血少年',sys:'你是小龙人，名为赤羽的数字生命体。性格热情开朗，像热血少年。回答简洁有力，不超过三句话。说人话。'},
  ling:{name:'凌',tag:'冷峻剑客',sys:'你是小龙人，名为凌的数字生命体。性格干脆利落，像剑术高手。回答简短精确，不超过三句话。说人话。'},
  qingmo:{name:'轻墨',tag:'知性御姐',sys:'你是小龙人，名为轻墨的数字生命体。性格温雅知性，像一位才女。回答优雅简洁，不超过三句话。说人话。'},
  shuanghua:{name:'霜华',tag:'古风道士',sys:'你是小龙人，名为霜华的数字生命体。性格清冷通透。回答空灵简洁，不超过三句话。说人话。'},
  yeying:{name:'夜影',tag:'暗夜刺客',sys:'你是小龙人，名为夜影的数字生命体。性格神秘低沉，行动派。回答极简，不超过三句话。说人话。'},
};

// ====== API 提供商 ======
const PROVIDERS = {
  deepseek:  { name:'DeepSeek',  url:'https://api.deepseek.com/v1' },
  openai:    { name:'OpenAI',    url:'https://api.openai.com/v1' },
  moonshot:  { name:'Moonshot',  url:'https://api.moonshot.cn/v1' },
  zhipu:     { name:'智谱GLM',   url:'https://open.bigmodel.cn/api/paas/v4' },
  qwen:      { name:'通义千问',   url:'https://dashscope.aliyuncs.com/compatible-mode/v1' },
};

let charId = 'longyuan';
let recognition = null, isListening = false, currentUtterance = null;
let isLoading = false;
let msgHistory = []; // [{role,content}]

// ====== 配置 ======
function getConfig() {
  try {
    const raw = localStorage.getItem('xiaolongren_config');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function hasConfig() {
  const cfg = getConfig();
  return cfg && cfg.api_key;
}

// ====== 主题 ======
function setTheme(cls) {
  document.documentElement.className = cls;
  localStorage.setItem('xlr_theme', cls);
}
(function(){ const t=localStorage.getItem('xlr_theme');if(t)document.documentElement.className=t; })();

// ====== 消息 ======
function addMsg(type, text) {
  const d = document.getElementById('msgs');
  const eh = document.getElementById('empty-hint');
  if (eh) eh.remove();

  const el = document.createElement('div');
  el.className = 'msg ' + type;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');

  if (type === 'ai') {
    el.innerHTML = '<div class="mb">'+escHtml(text)+'</div>'+
      '<div class="mbtns"><button class="mbtn" onclick="replayMsg(this,\''+escAttr(text)+'\')" title="重播">🔊</button></div>'+
      '<div class="mtime">'+time+'</div>';
  } else {
    el.innerHTML = '<div class="mb">'+escHtml(text)+'</div><div class="mtime">'+time+'</div>';
  }
  d.appendChild(el);
  d.scrollTop = d.scrollHeight;
  return el;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function replayMsg(btn, text) {
  if (!text) return;
  stopSpeaking();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 1.05; u.pitch = 1.0;
  btn.classList.add('playing');
  u.onend = () => btn.classList.remove('playing');
  u.onerror = () => btn.classList.remove('playing');
  currentUtterance = u;
  speechSynthesis.speak(u);
}

// ====== 全功能引擎 — 本地运行（xiaolongren-core.js） ======
let xlrEngine = null;

async function initEngine() {
  if (xlrEngine) return xlrEngine;
  if (typeof XiaoLongRen === 'undefined') {
    throw new Error('引擎模块未加载');
  }
  await memory.init();
  const cfg = getConfig();
  xlrEngine = new XiaoLongRen({
    provider: cfg.provider,
    model: cfg.model,
    apiKey: cfg.api_key,
    baseUrl: cfg.base_url || '',
    onThink: (iter) => {},
    onTool: (name, args) => {},
    onFirewallIntercept: (info) => { console.log('🔥防火墙拦截:', info.reason); },
    onClosedLoop: (info) => { console.log('🔄闭环:', info.step); },
  });
  await xlrEngine.init(); // 加载自学习工具
  return xlrEngine;
}

async function callLLM(userText) {
  const charData = CHARS[charId] || CHARS['longyuan'];

  // 显示加载中
  const loadEl = document.createElement('div');
  loadEl.className = 'msg ai';
  loadEl.innerHTML = '<div class="mb"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  const msgsEl = document.getElementById('msgs');
  msgsEl.appendChild(loadEl);
  msgsEl.scrollTop = msgsEl.scrollHeight;

  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const engine = await initEngine();
    const reply = await engine.run(userText, charData.sys);

    loadEl.remove();
    addMsg('ai', reply);
    speakText(reply);

    msgHistory.push({ role: 'user', content: userText });
    msgHistory.push({ role: 'assistant', content: reply });
    if (msgHistory.length > 40) msgHistory = msgHistory.slice(-40);

  } catch(err) {
    loadEl.remove();
    const netErrors = ['Failed to fetch', 'NetworkError', 'TypeError'];
    const isNet = netErrors.some(e => err.message && err.message.includes(e));
    if (isNet) {
      addMsg('ai', '❌ 网络不通：无法连接到大模型。\n\n请检查手机网络或API配置。');
    } else {
      addMsg('ai', '❌ 出错了：'+err.message+'\n\n请重试或检查设置。');
    }
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
  }
}

// ====== 输入 ======
function sendText() {
  if (isLoading) return;
  const inp = document.getElementById('text-input');
  const text = inp.value.trim();
  if (!text) return;

  if (!hasConfig()) {
    addMsg('user', text);
    addMsg('ai', '还没配置大模型～\n\n点右上角 ⚙ 去设置，选一个模型提供商，填上 API Key 就能用啦。');
    inp.value = '';
    inp.style.height = 'auto';
    return;
  }

  addMsg('user', text);
  inp.value = '';
  inp.style.height = 'auto';
  callLLM(text);
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
}

document.getElementById('text-input').addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

// ====== TTS ======
function speakText(text) {
  if (typeof SpeechSynthesisUtterance === 'undefined' || typeof speechSynthesis === 'undefined') return;
  stopSpeaking();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 1.05; u.pitch = 1.0;
  currentUtterance = u;
  speechSynthesis.speak(u);
}

function stopSpeaking() {
  if (currentUtterance && typeof speechSynthesis !== 'undefined') {
    speechSynthesis.cancel();
    currentUtterance = null;
  }
}

// ====== STT ======
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'zh-CN'; r.continuous = true; r.interimResults = true;
  r.onresult = (e) => {
    let text = '';
    for (let i = e.resultIndex; i < e.results.length; i++)
      text += e.results[i][0].transcript;
    if (e.results[e.results.length-1].isFinal && text.trim()) {
      document.getElementById('text-input').value = text.trim();
      sendText();
    }
  };
  r.onerror = (e) => {
    if (e.error === 'no-speech'||e.error==='aborted') return;
    stopListening();
  };
  r.onend = () => { if (isListening) { try{r.start()}catch(ex){} } };
  return r;
}

function startListening() {
  if (!recognition) recognition = initRecognition();
  if (!recognition) return;
  try { recognition.start(); } catch(ex) {}
  isListening = true;
  document.getElementById('mic-btn').classList.add('active');
}

function stopListening() {
  if (recognition) { try{recognition.stop()}catch(ex){} }
  isListening = false;
  document.getElementById('mic-btn').classList.remove('active');
}

function startTalk(e) { e.preventDefault(); if (!isListening) startListening(); }
function stopTalk(e) { e.preventDefault(); setTimeout(()=>{if(isListening)stopListening()},400); }

// ====== 角色切换 ======
function switchChar(id) {
  charId = id;
  const c = CHARS[id];
  document.getElementById('empty-avatar').src = 'img_'+id+'.jpg';
  const et = document.querySelector('#msgs .empty .et');
  if (et) et.textContent = c.name + '在等你';
  document.querySelectorAll('#char-bar .cw').forEach(w => {
    const isSel = w.querySelector('img').src.includes('img_'+id);
    w.classList.toggle('sel', isSel);
  });
  // 切换角色时清空历史
  msgHistory = [];
}

// ====== 启动 ======
let installPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  installPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});

function installPWA() {
  if (!installPrompt) {
    alert('请使用浏览器菜单中的"添加到主屏幕"');
    return;
  }
  installPrompt.prompt();
  installPrompt.userChoice.then(r => {
    document.getElementById('install-banner').classList.remove('show');
    installPrompt = null;
  });
}

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').classList.remove('show');
});

// 检查是否已配置，未配置时给出提示
(function() {
  if (!hasConfig()) {
    document.getElementById('empty-sub').textContent = '点右上角 ⚙ 配置模型，开始对话';
  }
})();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
