name: Build APK

on:
  push:
    paths:
      - 'frontend/pwa/html/**'
      - 'mobile/android-app/**'
      - '.github/workflows/apk-build.yml'
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Build APK
        run: |
          set -e
          mkdir -p app-build/www
          cp -r frontend/pwa/html/* app-build/www/
          # 全功能版：保留Pyodide核心运行时（WASM引擎+Python标准库），只去重包
          # KEEP: pyodide.asm.wasm(10MB), python_stdlib.zip(2MB), pyodide.js, pyodide.mjs, python
          # 包(.whl)首次启动时按需通过micropip从CDN加载，不占APK体积
          cp -r frontend/pwa/pyodide app-build/www/pyodide
          # 只删包文件，保留核心运行时
          rm -f app-build/www/pyodide/*.whl app-build/www/pyodide/*.whl.metadata 2>/dev/null || true
          rm -f app-build/www/pyodide/*.tar app-build/www/pyodide/*.so 2>/dev/null || true
          rm -f app-build/www/pyodide/pyodide.js.map app-build/www/pyodide/pyodide.mjs.map 2>/dev/null || true
          rm -f app-build/www/pyodide/package.json 2>/dev/null || true
          echo "Pyodide核心保留: $(du -sh app-build/www/pyodide/ | cut -f1)"
          cp app-build/www/mobile.html app-build/www/index.html
          rm -f app-build/www/server.py
          cd app-build
          npm init -y > /dev/null 2>&1
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init 小龙人 com.pspai.xiaolongren --web-dir=www
          npx cap add android
          # 配置App名和图标
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">小龙人<\/string>/' \
            android/app/src/main/res/values/strings.xml
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' \
            android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          # 复制图标
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            [ -f ${{ github.workspace }}/mobile/android-app/res/mipmap-${density}/ic_launcher.png ] && \
              cp ${{ github.workspace }}/mobile/android-app/res/mipmap-${density}/ic_launcher.png \
                android/app/src/main/res/mipmap-${density}/ic_launcher.png
          done
          # 网络安全配置
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'NSEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">api.deepseek.com</domain>
                  <domain includeSubdomains="true">api.openai.com</domain>
                  <domain includeSubdomains="true">api.moonshot.cn</domain>
                  <domain includeSubdomains="true">open.bigmodel.cn</domain>
                  <domain includeSubdomains="true">dashscope.aliyuncs.com</domain>
                  <domain includeSubdomains="true">github.com</domain>
                  <domain includeSubdomains="true">objects.githubusercontent.com</domain>
              </domain-config>
          </network-security-config>
          NSEOF
          sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' \
            android/app/src/main/AndroidManifest.xml
          # Kotlin fix
          cat >> android/app/build.gradle << 'GRADLEEOF'

          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          GRADLEEOF
          SDK=$(echo $ANDROID_HOME $ANDROID_SDK_ROOT | tr ' ' '\n' | head -1)
          echo "sdk.dir=$SDK" > android/local.properties
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -30
          echo "--- APK size ---"
          ls -lh app/build/outputs/apk/debug/app-debug.apk || echo "APK NOT FOUND"

      - uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: app-build/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0-mobile
          files: app-build/android/app/build/outputs/apk/debug/app-debug.apk
          name: 小龙人 Android APK
          body: |
            手机版全功能APK（刘玉龙修复版）
            - 修复发送按钮点不了的问题
            - config.html加返回按钮
            - Pyodide首次启动后台下载
          prerelease: true
          fail_on_unmatched_files: false
