name: Build APK

on:
  push:
    paths:
      - 'frontend/pwa/html/**'
      - 'mobile/android-app/**'
      - '.github/workflows/apk-build.yml'
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Debug env
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          java -version 2>&1 | head -1
          ls -la $ANDROID_HOME 2>/dev/null || echo "ANDROID_HOME not found"
          ls -la $ANDROID_SDK_ROOT 2>/dev/null || echo "ANDROID_SDK_ROOT not found"

      - name: Build APK
        run: |
          set -e
          mkdir -p app-build/www
          cp -r frontend/pwa/html/* app-build/www/
          cp app-build/www/mobile.html app-build/www/index.html
          rm -f app-build/www/server.py
          cd app-build
          npm init -y > /dev/null 2>&1
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init 小龙人 com.pspai.xiaolongren --web-dir=www
          npx cap add android
          SDK=$(echo $ANDROID_HOME $ANDROID_SDK_ROOT | tr ' ' '\n' | head -1)
          echo "Using SDK: $SDK"
          echo "sdk.dir=$SDK" > android/local.properties
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -20
          ls -lh app/build/outputs/apk/debug/app-debug.apk || echo "APK NOT FOUND"

      - uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-apk
          path: app-build/android/app/build/outputs/apk/debug/app-debug.apk
