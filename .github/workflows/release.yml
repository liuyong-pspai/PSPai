name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-engine:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            sep: ":"
          - name: macos
            os: macos-14
            sep: ":"
          - name: windows
            os: windows-2022
            sep: ";"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyinstaller pyyaml

      - name: Build
        run: |
          cd engine
          pyinstaller --onefile --name xiaolongren-engine-${{ matrix.name }} \
            --add-data "skills${{ matrix.sep }}skills" \
            --add-data "scripts${{ matrix.sep }}scripts" \
            --add-data "pspai_search.py${{ matrix.sep }}." \
            --hidden-import yaml \
            pspai_server.py
          echo "BUILD_OK" && ls -lh dist/

      - name: Upload engine
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 🚀 小龙人 ${{ github.ref_name }} 发布

            革命性的数字生命体对话平台。
            
            ### 📦 下载
            | 文件 | 平台 |
            |:--|:--|
            | `xiaolongren-engine-linux-x86_64` | 🐧 Linux |
            | `xiaolongren-engine-macos` | 🍎 macOS |
            | `xiaolongren-engine-windows.exe` | 🪟 Windows |
            | `xiaolongren-open-source.tar.gz` | 📂 开源层 |
            
            ### 🚀 快速开始
            ```bash
            tar xzf xiaolongren-open-source.tar.gz && cd PSPai && bash start.sh
            # 浏览器打开 http://localhost:8088
            ```
            
            📖 [完整更新日志](https://github.com/liuyong-pspai/PSPai/blob/master/CHANGELOG.md)
          files: engine/dist/xiaolongren-engine-${{ matrix.name }}${{ matrix.name == 'windows' && '.exe' || '' }}

      # 顺便在Linux job里打包开源层
      - name: Pack open-source (Linux only)
        if: matrix.name == 'linux-x86_64'
        run: |
          mkdir -p release-tmp
          cp -r UI原型 release-tmp/
          cp -r .env.example README.md LICENSE CHANGELOG.md CONTRIBUTING.md requirements.txt start.sh release-tmp/ 2>/dev/null || true
          cd release-tmp
          tar czf ../xiaolongren-open-source.tar.gz .
          cd ..
          ls -lh xiaolongren-open-source.tar.gz

      - name: Upload open-source (Linux only)
        if: matrix.name == 'linux-x86_64'
        uses: softprops/action-gh-release@v2
        with:
          files: xiaolongren-open-source.tar.gz

  set-repo-meta:
    needs: build-engine
    runs-on: ubuntu-22.04
    steps:
      - name: Set repo topics & homepage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 设置 Topics
          curl -sL -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GH_TOKEN" \
            -d '{"names":["ai","chatbot","digital-lifeform","agent","llm","memory","pwa","opensource","xiaolongren","chinese"]}' \
            "https://api.github.com/repos/${{ github.repository }}/topics"

          # 设置 Homepage
          curl -sL -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GH_TOKEN" \
            -d '{"homepage":"https://github.com/liuyong-pspai/PSPai"}' \
            "https://api.github.com/repos/${{ github.repository }}"
