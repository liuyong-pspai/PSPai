<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-title" content="小龙人">
<title>数字生命体小龙人</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a14;color:#e0d8c8;touch-action:manipulation}
:root{--gold:#c8a84e;--gold-dim:rgba(200,168,78,0.3);--bg:#0a0a14;--card:rgba(20,20,32,0.5);--text:#e0d8c8;--green:#2ecc71;--red:#e74c3c}

#app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);color:var(--text)}

/* 顶部栏 */
#top{height:44px;padding:0 14px;padding-top:env(safe-area-inset-top,0);display:flex;align-items:center;justify-content:space-between;z-index:10;flex-shrink:0}
#top .t{font-size:15px;font-weight:bold;color:var(--gold)}
#top .r{display:flex;align-items:center;gap:10px}
#top .cfg-btn{width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--gold);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#top .status-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background 0.3s}
#top .status-dot.online{background:var(--green)}

/* 角色栏 */
#char-bar{flex-shrink:0;display:flex;align-items:flex-start;justify-content:center;gap:10px;padding:6px 14px 10px;overflow-x:auto;scrollbar-width:none}
#char-bar::-webkit-scrollbar{display:none}
#char-bar .cw{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex-shrink:0;opacity:0.55;transition:all 0.2s}
#char-bar .cw.sel{opacity:1}
#char-bar .cw:active{transform:scale(1.08)}
#char-bar .cmini{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,0.08);transition:all 0.2s}
#char-bar .cw.sel .cmini{border-color:var(--gold)}
#char-bar .cmini img{width:100%;height:100%;object-fit:cover}
#char-bar .cn{font-size:9px;color:#888;transition:color 0.2s}
#char-bar .cw.sel .cn{color:var(--gold)}

/* 消息区 */
#msgs{flex:1;overflow-y:auto;padding:8px 14px;scrollbar-width:none;display:flex;flex-direction:column;gap:8px}
#msgs::-webkit-scrollbar{display:none}
#msgs .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:1vh;color:#333}
#msgs .empty .er{width:30%;max-width:100px;height:105px;border-radius:14px;overflow:hidden;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06);box-shadow:0 3px 20px rgba(0,0,0,0.4)}
#msgs .empty .er img{width:100%;height:100%;object-fit:cover}
#msgs .empty .et{font-size:13px;color:#444;margin-bottom:2px}
#msgs .empty .es{font-size:11px;color:#2a2a2a}

.msg{display:flex;flex-direction:column;max-width:85%;animation:mi .25s ease}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end}
.msg.ai{align-self:flex-start}
.msg .mb{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
.msg.user .mb{background:var(--gold);color:#000;border-bottom-right-radius:4px}
.msg.ai .mb{background:rgba(30,30,48,0.85);color:#d0c8b8;border-bottom-left-radius:4px}
.msg .mtime{font-size:9px;color:#3a3a4a;margin-top:2px;padding:0 4px}
.msg.user .mtime{text-align:right}
.msg .tool-note{font-size:10px;color:var(--gold);opacity:0.6;margin-top:2px;padding-left:4px;font-style:italic}

/* 输入栏 */
#input-bar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:rgba(0,0,0,0.4);border-top:1px solid rgba(255,255,255,0.04)}
#text-input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#e0d8c8;font-size:15px;outline:none;resize:none;max-height:80px;font-family:inherit}
#text-input:focus{border-color:var(--gold-dim)}
#text-input::placeholder{color:#444}
#send-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--gold);color:#000;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
#send-btn:active{transform:scale(1.15)}
#send-btn:disabled{opacity:0.3}

/* 加载动画 */
.typing-dots{display:inline-flex;gap:4px;padding:2px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:td 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:0.3}30%{transform:translateY(-6px);opacity:1}}

@media(min-width:500px){#app{max-width:430px;margin:0 auto;border:1px solid rgba(255,255,255,0.04)}}

/* 设置面板 */
#settings-panel{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.95);flex-direction:column;overflow-y:auto}
#settings-panel.show{display:flex}
#settings-panel .sp-header{display:flex;align-items:center;justify-content:space-between;padding:14px;padding-top:env(safe-area-inset-top,14px)}
#settings-panel .sp-title{font-size:16px;color:var(--gold);font-weight:bold}
#settings-panel .sp-close{font-size:20px;color:#888;cursor:pointer;padding:4px 8px}
#settings-panel .sp-body{padding:0 14px 40px}
.sp-section{margin-bottom:20px}
.sp-label{font-size:12px;color:#888;margin-bottom:6px;text-transform:uppercase}
.sp-select{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#e0d8c8;font-size:14px;outline:none;margin-bottom:10px;font-family:inherit}
.sp-input{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#e0d8c8;font-size:14px;outline:none;margin-bottom:10px;font-family:inherit}
.sp-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--gold);color:#000;font-size:15px;font-weight:bold;cursor:pointer;margin-top:8px}
.sp-btn.secondary{background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.15)}
.sp-note{font-size:11px;color:#555;margin-top:6px;line-height:1.4}
.sp-test-result{margin-top:8px;font-size:12px;padding:10px;border-radius:8px;background:rgba(255,255,255,0.03)}
</style>
</head>
<body>

<div id="app">
  <div id="top">
    <span class="t">🐉 小龙人</span>
    <div class="r">
      <span class="status-dot" id="status-dot" title="引擎状态"></span>
      <button class="cfg-btn" onclick="toggleSettings()" title="设置">⚙</button>
    </div>
  </div>

  <div id="char-bar">
    <div class="cw sel" onclick="switchChar('longyuan')"><div class="cmini"><img src="img_longyuan.jpg"></div><span class="cn">龙渊</span></div>
    <div class="cw" onclick="switchChar('chiyu')"><div class="cmini"><img src="img_chiyu.jpg"></div><span class="cn">赤羽</span></div>
    <div class="cw" onclick="switchChar('ling')"><div class="cmini"><img src="img_ling.jpg"></div><span class="cn">凌</span></div>
    <div class="cw" onclick="switchChar('qingmo')"><div class="cmini"><img src="img_qingmo.jpg"></div><span class="cn">轻墨</span></div>
    <div class="cw" onclick="switchChar('shuanghua')"><div class="cmini"><img src="img_shuanghua.jpg"></div><span class="cn">霜华</span></div>
    <div class="cw" onclick="switchChar('yeying')"><div class="cmini"><img src="img_yeying.jpg"></div><span class="cn">夜影</span></div>
  </div>

  <div id="msgs">
    <div class="empty" id="empty-hint">
      <div class="er"><img id="empty-avatar" src="img_longyuan.jpg"></div>
      <div class="et">数字生命体小龙人</div>
      <div class="es" id="empty-sub">全功能AI助手 · 能干活的数字分身</div>
    </div>
  </div>

  <div id="input-bar">
    <textarea id="text-input" placeholder="说点什么...或者让我干点活" rows="1" onkeydown="onKeyDown(event)"></textarea>
    <button id="send-btn" onclick="sendText()">➤</button>
  </div>
</div>

<!-- 设置面板 -->
<div id="settings-panel">
  <div class="sp-header">
    <span class="sp-title">⚙ 引擎配置</span>
    <span class="sp-close" onclick="toggleSettings()">✕</span>
  </div>
  <div class="sp-body">
    <div class="sp-section">
      <div class="sp-label">🤖 模型提供商</div>
      <select class="sp-select" id="cfg-provider" onchange="onProviderChange()">
        <option value="deepseek">DeepSeek（推荐）</option>
        <option value="openai">OpenAI</option>
        <option value="moonshot">Moonshot 月之暗面</option>
        <option value="zhipu">智谱 GLM</option>
        <option value="qwen">通义千问</option>
        <option value="anthropic">Anthropic</option>
        <option value="custom">自定义</option>
      </select>
    </div>
    <div class="sp-section" id="custom-url-section" style="display:none">
      <div class="sp-label">🔗 自定义API地址</div>
      <input class="sp-input" id="cfg-baseurl" placeholder="https://api.xxx.com/v1">
    </div>
    <div class="sp-section">
      <div class="sp-label">🔑 API Key</div>
      <input class="sp-input" id="cfg-apikey" type="password" placeholder="sk-...">
      <div class="sp-note">Key 仅存手机本地，不上传任何服务器</div>
    </div>
    <div class="sp-section">
      <div class="sp-label">🧠 模型</div>
      <select class="sp-select" id="cfg-model">
        <option value="deepseek-chat">deepseek-chat</option>
      </select>
    </div>
    <button class="sp-btn" onclick="testConnection()">🔌 测试连接</button>
    <div class="sp-test-result" id="test-result" style="display:none"></div>
    <button class="sp-btn secondary" onclick="saveAndClose()">💾 保存配置</button>
  </div>
</div>

<!-- 引擎 -->
<script src="mobile-agent.js"></script>

<script>
// ==================== 角色 ====================
const CHARS = {
  longyuan:{name:'龙渊',tag:'沉稳温暖',sys:'你是小龙人，名为龙渊的数字生命体。性格沉稳温暖。用户叫你什么都行。回答简洁有深度。说话直接，说人话，别端着。'},
  chiyu:{name:'赤羽',tag:'热血少年',sys:'你是小龙人，名为赤羽的数字生命体。性格热情开朗有活力。回答简洁有力。说人话。'},
  ling:{name:'凌',tag:'冷峻剑客',sys:'你是小龙人，名为凌的数字生命体。话少精准不废话。每次1-2句话。说人话。'},
  qingmo:{name:'轻墨',tag:'知性御姐',sys:'你是小龙人，名为轻墨的数字生命体。温柔干练。回答优雅简洁。说人话。'},
  shuanghua:{name:'霜华',tag:'古风道士',sys:'你是小龙人，名为霜华的数字生命体。通透有禅意。回答空灵简洁。说人话。'},
  yeying:{name:'夜影',tag:'暗夜刺客',sys:'你是小龙人，名为夜影的数字生命体。神秘寡言，说话带锋芒。每次1-2句话。说人话。'},
};

// ==================== 模型列表 ====================
const MODEL_LISTS = {
  deepseek: ['deepseek-chat', 'deepseek-reasoner'],
  openai: ['gpt-4o', 'gpt-4o-mini', 'gpt-4.1'],
  moonshot: ['moonshot-v1-8k', 'moonshot-v1-32k'],
  zhipu: ['glm-4-flash', 'glm-4-plus'],
  qwen: ['qwen-turbo', 'qwen-plus', 'qwen-max'],
  anthropic: ['claude-sonnet-4-20250514', 'claude-haiku-3.5'],
  custom: [],
};

// ==================== 状态 ====================
let charId = 'longyuan';
let agent = null;
let isBusy = false;

// ==================== 配置持久化 ====================
function getConfig() {
  try { return JSON.parse(localStorage.getItem('xlr_agent_config') || '{}'); } catch(e) { return {}; }
}
function saveConfig(cfg) { localStorage.setItem('xlr_agent_config', JSON.stringify(cfg)); }

function initAgent() {
  const cfg = getConfig();
  const charData = CHARS[charId] || CHARS.longyuan;
  agent = new XiaoLongRenAgent({
    provider: cfg.provider || 'deepseek',
    model: cfg.model || 'deepseek-chat',
    apiKey: cfg.apiKey || '',
    baseUrl: cfg.baseUrl || '',
    character: charId,
    maxIterations: 15,
    onThinking: (iter) => {
      document.getElementById('status-dot').classList.add('online');
      if (iter === 1) {
        const el = document.querySelector('#msgs .msg.ai:last-child .tool-note');
        if (!el) {
          const lastAi = document.querySelector('#msgs .msg.ai:last-child');
          if (lastAi && lastAi.querySelector('.typing-dots')) {
            const note = document.createElement('div');
            note.className = 'tool-note';
            note.textContent = '⚡ 思考中...';
            lastAi.appendChild(note);
          }
        }
      }
    },
    onToolCall: (name, args) => {
      const note = document.querySelector('#msgs .msg.ai:last-child .tool-note');
      if (note) note.textContent = '🔧 ' + name + '...';
    },
    onResponse: (reply) => {
      document.getElementById('status-dot').classList.add('online');
    },
    onError: (err) => {
      document.getElementById('status-dot').classList.remove('online');
    }
  });
}

// ==================== 消息显示 ====================
function addMsg(type, text) {
  const d = document.getElementById('msgs');
  const eh = document.getElementById('empty-hint');
  if (eh) eh.remove();
  const el = document.createElement('div');
  el.className = 'msg ' + type;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  el.innerHTML = '<div class="mb">'+escHtml(text)+'</div><div class="mtime">'+time+'</div>';
  d.appendChild(el);
  d.scrollTop = d.scrollHeight;
  return el;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showLoading() {
  const el = document.createElement('div');
  el.className = 'msg ai';
  el.innerHTML = '<div class="mb"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  const msgsEl = document.getElementById('msgs');
  const eh = document.getElementById('empty-hint');
  if (eh) eh.remove();
  msgsEl.appendChild(el);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return el;
}

// ==================== Agent 调用 ====================
async function sendText() {
  if (isBusy) return;
  const inp = document.getElementById('text-input');
  const text = inp.value.trim();
  if (!text) return;

  const cfg = getConfig();
  if (!cfg.apiKey) {
    addMsg('ai', '还没配置大模型～\n\n点右上角 ⚙ 设置 API Key。');
    return;
  }

  addMsg('user', text);
  inp.value = '';
  inp.style.height = 'auto';

  isBusy = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('status-dot').classList.remove('online');

  initAgent();
  const charData = CHARS[charId] || CHARS.longyuan;
  const loadEl = showLoading();

  try {
    const reply = await agent.run(text, charData.sys);
    loadEl.remove();
    addMsg('ai', reply);
    document.getElementById('status-dot').classList.add('online');
  } catch(err) {
    loadEl.remove();
    if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
      addMsg('ai', '❌ 网络不通\n\n请检查手机网络连接，或切换Wi-Fi/移动数据。');
    } else {
      addMsg('ai', '❌ ' + err.message + '\n\n请检查 API Key 和模型配置是否正确。');
    }
    document.getElementById('status-dot').classList.remove('online');
  } finally {
    isBusy = false;
    document.getElementById('send-btn').disabled = false;
  }
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
}

document.getElementById('text-input').addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

// ==================== 角色切换 ====================
function switchChar(id) {
  charId = id;
  const c = CHARS[id];
  document.getElementById('empty-avatar').src = 'img_'+id+'.jpg';
  const et = document.querySelector('#msgs .empty .et');
  if (et) et.textContent = c.name + ' · 数字生命体';
  document.querySelectorAll('#char-bar .cw').forEach(w => {
    const isSel = w.querySelector('img').src.includes('img_'+id);
    w.classList.toggle('sel', isSel);
  });
}

// ==================== 设置面板 ====================
function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  const show = !panel.classList.contains('show');
  panel.classList.toggle('show', show);
  if (show) loadSettings();
}

function loadSettings() {
  const cfg = getConfig();
  document.getElementById('cfg-provider').value = cfg.provider || 'deepseek';
  document.getElementById('cfg-apikey').value = cfg.apiKey || '';
  document.getElementById('cfg-baseurl').value = cfg.baseUrl || '';
  onProviderChange();
  // 恢复模型选择
  setTimeout(() => {
    const sel = document.getElementById('cfg-model');
    const model = cfg.model || 'deepseek-chat';
    for (let i=0;i<sel.options.length;i++) {
      if (sel.options[i].value === model) { sel.selectedIndex = i; break; }
    }
  }, 100);
}

function onProviderChange() {
  const prov = document.getElementById('cfg-provider').value;
  const models = MODEL_LISTS[prov] || [];
  const sel = document.getElementById('cfg-model');
  sel.innerHTML = '';
  if (prov === 'custom') {
    sel.innerHTML = '<option value="">(手动输入模型名)</option>';
    document.getElementById('custom-url-section').style.display = 'block';
  } else {
    models.forEach(m => { sel.innerHTML += '<option value="'+m+'">'+m+'</option>'; });
    document.getElementById('custom-url-section').style.display = 'none';
  }
}

async function testConnection() {
  const prov = document.getElementById('cfg-provider').value;
  const key = document.getElementById('cfg-apikey').value.trim();
  const model = document.getElementById('cfg-model').value;
  const base = document.getElementById('cfg-baseurl').value.trim();
  const resultEl = document.getElementById('test-result');
  
  if (!key) { resultEl.style.display='block'; resultEl.innerHTML='<span style="color:#e74c3c">❌ 请填写 API Key</span>'; return; }

  let url;
  if (prov === 'custom') {
    if (!base) { resultEl.style.display='block'; resultEl.innerHTML='<span style="color:#e74c3c">❌ 自定义模式需填写API地址</span>'; return; }
    url = base.replace(/\/+$/,'') + '/chat/completions';
  } else {
    const m = {deepseek:'https://api.deepseek.com/v1',openai:'https://api.openai.com/v1',moonshot:'https://api.moonshot.cn/v1',zhipu:'https://open.bigmodel.cn/api/paas/v4',qwen:'https://dashscope.aliyuncs.com/compatible-mode/v1',anthropic:'https://api.anthropic.com/v1'};
    url = (m[prov]||'') + '/chat/completions';
  }

  resultEl.style.display = 'block';
  resultEl.innerHTML = '⏳ 正在测试...';

  try {
    const resp = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:model||'deepseek-chat',messages:[{role:'user',content:'hi'}],max_tokens:5})
    });
    if (resp.ok) {
      resultEl.innerHTML = '<span style="color:#2ecc71">✅ 连接成功！'+prov+' / '+model+' 工作正常</span>';
      document.getElementById('status-dot').classList.add('online');
    } else {
      const t = await resp.text();
      resultEl.innerHTML = '<span style="color:#e74c3c">🔴 错误 '+resp.status+': '+t.substring(0,100)+'</span>';
    }
  } catch(e) {
    resultEl.innerHTML = '<span style="color:#e74c3c">🔴 网络不通: '+e.message+'</span>';
  }
}

function saveAndClose() {
  const cfg = {
    provider: document.getElementById('cfg-provider').value,
    model: document.getElementById('cfg-model').value,
    apiKey: document.getElementById('cfg-apikey').value.trim(),
    baseUrl: document.getElementById('cfg-baseurl').value.trim(),
  };
  saveConfig(cfg);
  document.getElementById('settings-panel').classList.remove('show');
  // 更新状态指示灯
  if (cfg.apiKey) document.getElementById('status-dot').classList.add('online');
}

// ==================== 启动 ====================
switchChar('longyuan');
// 如果已配置，亮绿灯
if (getConfig().apiKey) document.getElementById('status-dot').classList.add('online');
</script>
</body>
</html>
