<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-title" content="小龙人">
<title>🐉 小龙人</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a14;color:#e0d8c8;touch-action:manipulation;user-select:none;-webkit-user-select:none}
:root{--gold:#c8a84e;--gold-dim:rgba(200,168,78,0.3)}

#app{position:fixed;inset:0;display:flex;flex-direction:column}

/* 顶部 */
#top{height:44px;padding:0 14px;padding-top:env(safe-area-inset-top,0);display:flex;align-items:center;justify-content:space-between;z-index:10;flex-shrink:0}
#top .t{font-size:15px;font-weight:bold;color:var(--gold)}
#top .st{font-size:11px}

/* 设置面板 */
#settings{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px}
#settings.show{display:flex}
#settings input{width:100%;max-width:320px;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:16px;text-align:center}
#settings button{padding:12px 40px;border-radius:10px;border:none;background:var(--gold);color:#000;font-size:16px;font-weight:bold;cursor:pointer}
#settings .close{color:#888;font-size:13px;cursor:pointer;margin-top:16px}

/* 角色区 */
#char-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
#char-ring{width:130px;height:130px;border-radius:50%;padding:3px;transition:all 0.3s}
#char-ring.listening{animation:ring 1.5s ease-in-out infinite}
#char-ring.speaking{animation:speakring 0.6s ease-in-out infinite}
@keyframes ring{0%,100%{box-shadow:0 0 12px var(--gold-dim)}50%{box-shadow:0 0 40px var(--gold),0 0 80px var(--gold-dim)}}
@keyframes speakring{0%,100%{box-shadow:0 0 18px var(--gold-dim)}50%{box-shadow:0 0 50px var(--gold),0 0 90px var(--gold-dim)}}
#char-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover}
#char-ring.listening img{animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
#char-name{font-size:16px;font-weight:bold;color:var(--gold);margin-top:10px}
#char-tag{font-size:10px;color:#555;margin-top:2px}

/* 状态 */
#status{font-size:13px;color:#888;margin-top:8px;text-align:center;min-height:20px;transition:all 0.3s}

/* 气泡 */
#bubble{position:absolute;bottom:70px;left:16px;right:16px;text-align:center;pointer-events:none;z-index:5}
#bubble .b{display:inline-block;padding:10px 18px;border-radius:16px;background:rgba(0,0,0,0.75);color:#fff;font-size:16px;max-width:90%;line-height:1.5;opacity:0;transform:translateY(10px);transition:all 0.25s}
#bubble .b.show{opacity:1;transform:translateY(0)}

/* 底部 */
#dock{flex-shrink:0;padding:10px 16px;padding-bottom:max(16px,env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:center;gap:16px;z-index:10}
#talk-btn{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#a08020);border:3px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;position:relative;flex-shrink:0}
#talk-btn:active,#talk-btn.active{transform:scale(1.15)}
#talk-btn.active{animation:tpulse 1.2s ease-in-out infinite}
@keyframes tpulse{0%,100%{box-shadow:0 0 25px var(--gold-dim)}50%{box-shadow:0 0 60px var(--gold),0 0 100px var(--gold-dim)}}
#talk-btn .icon{font-size:28px;color:#fff;pointer-events:none}
#talk-ripple{position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--gold);opacity:0}
#talk-btn.active #talk-ripple{opacity:1;animation:ripple 1.5s ease-out infinite}
@keyframes ripple{0%{inset:-6px;opacity:0.8}100%{inset:-30px;opacity:0}}

.char-btn{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,0.08);cursor:pointer;opacity:0.35;transition:all 0.2s;flex-shrink:0}
.char-btn:active,.char-btn.sel{opacity:1;border-color:var(--gold);transform:scale(1.12)}
.char-btn img{width:100%;height:100%;object-fit:cover}

@media(min-width:500px){#app{max-width:430px;margin:0 auto;border:1px solid rgba(255,255,255,0.04)}}
</style>
</head>
<body>

<div id="app">
  <div id="top">
    <span class="t">🐉 小龙人</span>
    <span class="st" id="conn-dot" style="color:#f44;cursor:pointer" onclick="showSettings()">● 离线</span>
  </div>

  <div id="char-area">
    <div id="char-ring"><img id="char-img" src="img_longyuan.jpg" alt="龙渊"></div>
    <div id="char-name">龙渊</div>
    <div id="char-tag">你的AI伙伴</div>
    <div id="status">轻触金色按钮开始说话</div>
    <div id="bubble"><div class="b"></div></div>
  </div>

  <div id="dock">
    <div class="char-btn sel" onclick="switchChar('longyuan')"><img src="img_longyuan.jpg"></div>
    <div class="char-btn" onclick="switchChar('chiyu')"><img src="img_chiyu.jpg"></div>
    <div id="talk-btn" ontouchstart="startTalk(event)" ontouchend="stopTalk(event)" onmousedown="startTalk(event)" onmouseup="stopTalk(event)">
      <div id="talk-ripple"></div>
      <span class="icon">🎤</span>
    </div>
    <div class="char-btn" onclick="switchChar('ling')"><img src="img_ling.jpg"></div>
    <div class="char-btn" onclick="switchChar('qingmo')"><img src="img_qingmo.jpg"></div>
  </div>
</div>

<div id="settings">
  <div style="color:var(--gold);font-size:16px;font-weight:bold">⚙️ 连接设置</div>
  <input id="server-input" placeholder="例: 192.168.1.35:8765" value="">
  <button onclick="saveSettings()">连接</button>
  <div id="settings-hint" style="color:#888;font-size:11px;text-align:center;max-width:280px">
    输入小龙人引擎地址<br>同一WiFi下填局域网IP<br>出门在外需要公网地址
  </div>
  <span class="close" onclick="hideSettings()">取消</span>
</div>

<script>
// ====== 角色 ======
const CHARS = {
  longyuan:{name:'龙渊',tag:'沉稳温暖'},
  chiyu:{name:'赤羽',tag:'热血少年'},
  ling:{name:'凌',tag:'冷峻剑客'},
  qingmo:{name:'轻墨',tag:'知性御姐'},
  shuanghua:{name:'霜华',tag:'古风道士'},
  yeying:{name:'夜影',tag:'暗夜刺客'},
};

let ws = null, charId = 'longyuan', recognition = null;
let isListening = false, currentUtterance = null;
let serverAddr = localStorage.getItem('xlr_server') || '';

// ====== WebSocket ======
function connectWS() {
  if (ws) { ws.close(); ws = null; }
  let addr = serverAddr || location.hostname + ':8765';
  if (!addr.includes(':')) addr += ':8765';
  if (!addr.startsWith('w')) addr = 'ws://' + addr;
  
  document.getElementById('conn-dot').style.color = '#fa0';
  document.getElementById('conn-dot').textContent = '● 连接中';
  setStatus('连接中...');
  
  try {
    ws = new WebSocket(addr);
    ws.onopen = () => {
      document.getElementById('conn-dot').style.color = '#4f8';
      document.getElementById('conn-dot').textContent = '● 已连接';
      setStatus('可以说话了');
    };
    ws.onclose = () => {
      document.getElementById('conn-dot').style.color = '#f44';
      document.getElementById('conn-dot').textContent = '● 离线';
      setStatus('连接断开，点右上角设置');
    };
    ws.onerror = () => {
      setStatus('连不上引擎，请检查地址');
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'reply') speakText(msg.text);
      else if (msg.type === 'interrupted') stopSpeaking();
    };
  } catch(e) {
    document.getElementById('conn-dot').style.color = '#f44';
    document.getElementById('conn-dot').textContent = '● 离线';
    setStatus('连接失败，点右上角设置地址');
  }
}

// ====== TTS ======
function speakText(text) {
  stopSpeaking();
  document.getElementById('char-ring').classList.add('speaking');
  showBubble(text);
  
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 1.05; u.pitch = 1.0;
  u.onend = () => {
    document.getElementById('char-ring').classList.remove('speaking');
    hideBubble();
    if (!isListening) setStatus('轻触金色按钮开始说话');
  };
  u.onerror = () => {
    document.getElementById('char-ring').classList.remove('speaking');
    hideBubble();
  };
  currentUtterance = u;
  speechSynthesis.speak(u);
}

function stopSpeaking() {
  if (currentUtterance) {
    speechSynthesis.cancel();
    document.getElementById('char-ring').classList.remove('speaking');
    hideBubble();
    currentUtterance = null;
  }
}

// ====== STT ======
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('浏览器不支持语音'); return null; }
  const r = new SR();
  r.lang = 'zh-CN'; r.continuous = true; r.interimResults = true;
  r.onresult = (e) => {
    let text = '';
    for (let i = e.resultIndex; i < e.results.length; i++)
      text += e.results[i][0].transcript;
    if (e.results[e.results.length-1].isFinal && text.trim()) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type:'text', text: text.trim()}));
        setStatus('听到了，正在想...');
      }
    }
  };
  r.onerror = (e) => {
    if (e.error === 'no-speech'||e.error==='aborted') return;
    if (e.error === 'not-allowed') setStatus('请允许麦克风权限');
    stopListening();
  };
  r.onend = () => { if (isListening) { try{r.start()}catch(ex){} } };
  return r;
}

function startListening() {
  if (!recognition) recognition = initRecognition();
  if (!recognition) return;
  stopSpeaking();
  try { recognition.start(); } catch(ex) {}
  isListening = true;
  document.getElementById('talk-btn').classList.add('active');
  document.getElementById('char-ring').classList.add('listening');
  setStatus('听着呢，说吧...');
}

function stopListening() {
  if (recognition) { try{recognition.stop()}catch(ex){} }
  isListening = false;
  document.getElementById('talk-btn').classList.remove('active');
  document.getElementById('char-ring').classList.remove('listening');
}

// ====== 按钮 ======
function startTalk(e) { e.preventDefault(); if (!isListening) startListening(); }
function stopTalk(e) { e.preventDefault(); setTimeout(()=>{if(isListening)stopListening()},300); }

// ====== 角色 ======
function switchChar(id) {
  charId = id;
  const c = CHARS[id];
  document.getElementById('char-img').src = 'img_'+id+'.jpg';
  document.getElementById('char-name').textContent = c.name;
  document.getElementById('char-tag').textContent = c.tag;
  document.querySelectorAll('.char-btn').forEach(b => {
    b.classList.toggle('sel', b.querySelector('img').src.includes('img_'+id));
  });
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({type:'switch_character', character: id}));
  setStatus('切换到了'+c.name);
}

// ====== 设置 ======
function showSettings() {
  document.getElementById('server-input').value = serverAddr || location.hostname+':8765';
  document.getElementById('settings').classList.add('show');
}
function hideSettings() { document.getElementById('settings').classList.remove('show'); }
function saveSettings() {
  serverAddr = document.getElementById('server-input').value.trim();
  localStorage.setItem('xlr_server', serverAddr);
  hideSettings();
  connectWS();
}

// ====== UI ======
function showBubble(t) { const b=document.querySelector('#bubble .b'); b.textContent=t; b.classList.add('show'); }
function hideBubble() { document.querySelector('#bubble .b').classList.remove('show'); }
function setStatus(t) { document.getElementById('status').textContent = t; }

// ====== 启动 ======
if (serverAddr) {
  connectWS();
} else {
  showSettings();
}

// 注册 Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
