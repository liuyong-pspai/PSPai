name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-engine:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            sep: ":"
          - name: macos
            os: macos-14
            sep: ":"
          - name: windows
            os: windows-2022
            sep: ";"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyinstaller pyyaml

      - name: Build
        run: |
          cd engine
          pyinstaller --onefile --name xiaolongren-engine-${{ matrix.name }} \
            --add-data "skills${{ matrix.sep }}skills" \
            --add-data "scripts${{ matrix.sep }}scripts" \
            --add-data "pspai_search.py${{ matrix.sep }}." \
            --hidden-import yaml \
            pspai_server.py
          echo "BUILD_OK" && ls -lh dist/

      - name: Upload engine
        uses: softprops/action-gh-release@v2
        with:
          files: engine/dist/xiaolongren-engine-${{ matrix.name }}${{ matrix.name == 'windows' && '.exe' || '' }}

      # 顺便在Linux job里打包开源层
      - name: Pack open-source (Linux only)
        if: matrix.name == 'linux-x86_64'
        run: |
          mkdir -p release-tmp
          cp -r UI原型 release-tmp/
          cp -r .env.example README.md LICENSE requirements.txt start.sh release-tmp/ 2>/dev/null || true
          cd release-tmp
          tar czf ../xiaolongren-open-source.tar.gz .
          cd ..
          ls -lh xiaolongren-open-source.tar.gz

      - name: Upload open-source (Linux only)
        if: matrix.name == 'linux-x86_64'
        uses: softprops/action-gh-release@v2
        with:
          files: xiaolongren-open-source.tar.gz
