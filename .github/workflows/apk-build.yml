name: Build APK (Capacitor)

on:
  push:
    paths:
      - 'frontend/pwa/html/**'
      - 'mobile/**'
      - '.github/workflows/apk-build.yml'
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Create Capacitor project
        run: |
          mkdir -p app-build && cd app-build
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init 小龙人 com.pspai.xiaolongren --web-dir=www

      - name: Copy web files
        run: |
          cp -r frontend/pwa/html/* app-build/www/
          rm -f app-build/www/server.py 2>/dev/null || true

      - name: Add Android platform
        working-directory: app-build
        run: npx cap add android

      - name: Configure Android
        run: |
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">小龙人</string>|' \
            app-build/android/app/src/main/res/values/strings.xml
          sed -i 's|android:usesCleartextTraffic="false"|android:usesCleartextTraffic="true"|' \
            app-build/android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          # Icon
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp mobile/android-app/res/mipmap-${d}/ic_launcher.png \
              app-build/android/app/src/main/res/mipmap-${d}/ic_launcher.png
            cp mobile/android-app/res/mipmap-${d}/ic_launcher_round.png \
              app-build/android/app/src/main/res/mipmap-${d}/ic_launcher_round.png 2>/dev/null || true
          done
          # Delete adaptive icon XMLs (Hongmeng compat)
          rm -rf app-build/android/app/src/main/res/mipmap-anydpi-v26 2>/dev/null || true
          rm -f app-build/android/app/src/main/res/drawable-v24/ic_launcher_foreground.* 2>/dev/null || true

      - name: Build APK
        working-directory: app-build/android
        run: ANDROID_HOME=$ANDROID_HOME ./gradlew assembleDebug 2>&1 | tail -30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-capacitor-apk
          path: app-build/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: PSP3.6
          files: app-build/android/app/build/outputs/apk/debug/app-debug.apk
          name: 小龙人 PSP3.6 Capacitor版
          body: |
            Capacitor框架构建。基于v2.0.0-mobile原方案。
            发送按钮鸿蒙触控修复。纯PNG图标。
            直连云端大模型，APK轻量。
          prerelease: true
          fail_on_unmatched_files: false
