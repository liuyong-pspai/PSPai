name: Build Full APK

on:
  push:
    paths:
      - 'frontend/pwa/html/**'
      - 'mobile/android-app/**'
      - '.github/workflows/apk-build.yml'
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Cache Pyodide
        id: cache-pyodide
        uses: actions/cache@v4
        with:
          path: pyodide-full
          key: pyodide-v0.27.5-full-${{ runner.os }}

      - name: Download Pyodide (cached)
        if: steps.cache-pyodide.outputs.cache-hit != 'true'
        run: |
          mkdir -p pyodide-full
          echo "⬇️ 下载Pyodide 0.27.5（首次运行，后续直接命中缓存）..."
          curl -L --max-time 300 -o pyodide-full/pyodide.tar.bz2 \
            "https://github.com/pyodide/pyodide/releases/download/0.27.5/pyodide-0.27.5.tar.bz2"
          echo "✅ 下载完成，解压中..."
          cd pyodide-full
          tar -xjf pyodide.tar.bz2
          rm pyodide.tar.bz2
          du -sh .
          echo "✅ Pyodide就绪"

      - name: Build APK (全功能版)
        run: |
          set -e
          mkdir -p app-build/www
          cp -r frontend/pwa/html/* app-build/www/
          # 全功能版：将完整Pyodide运行时复制进www
          # 注意：Pyodide压缩包解压后结构是 pyodide-full/pyodide/{pyodide.js,...}
          cp -r pyodide-full/pyodide/* app-build/www/pyodide/
          cp app-build/www/mobile.html app-build/www/index.html
          # 清理桌面专用文件
          rm -f app-build/www/server.py
          cd app-build
          npm init -y > /dev/null 2>&1
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init 小龙人 com.pspai.xiaolongren --web-dir=www
          npx cap add android
          # 配置App名和图标
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">小龙人<\/string>/' \
            android/app/src/main/res/values/strings.xml
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' \
            android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          # 🔴 关键修复：适配Android 8+自适应图标
          # 暴力删除所有旧图标，再用我们的PNG+自适应XML全覆盖
          echo "===== 替换图标 ====="
          find android/app/src/main/res/ -name "*ic_launcher*" -delete 2>/dev/null
          find android/app/src/main/res/ -type d -name "drawable-anydpi*" -exec rm -rf {} + 2>/dev/null
          find android/app/src/main/res/ -type d -name "drawable-v24" -exec rm -rf {} + 2>/dev/null
          echo "🗑️ 清除完毕"
          # 复制我们的PNG和自适应图标配置
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            SRC=${{ github.workspace }}/mobile/android-app/res/mipmap-${density}
            for DST in $(find android/app/src/main/res/ -maxdepth 1 -type d -name "mipmap-${density}*" 2>/dev/null); do
              for f in ic_launcher.png ic_launcher_round.png ic_launcher_foreground.png; do
                [ -f $SRC/$f ] && cp $SRC/$f $DST/$f
              done
              echo "✅ $DST"
            done
          done
          # 复制自适应图标XML配置
          ANYDPI_SRC=${{ github.workspace }}/mobile/android-app/res/mipmap-anydpi-v26
          ANYDPI_DST=android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p $ANYDPI_DST
          cp $ANYDPI_SRC/ic_launcher.xml $ANYDPI_DST/ic_launcher.xml
          cp $ANYDPI_SRC/ic_launcher_round.xml $ANYDPI_DST/ic_launcher_round.xml
          echo "✅ 自适应图标XML已配置"
          # 复制背景颜色配置
          mkdir -p android/app/src/main/res/values
          cp ${{ github.workspace }}/mobile/android-app/res/values/ic_launcher_background.xml \
            android/app/src/main/res/values/ic_launcher_background.xml
          # 网络安全配置
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'NSEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">api.deepseek.com</domain>
                  <domain includeSubdomains="true">api.openai.com</domain>
                  <domain includeSubdomains="true">api.moonshot.cn</domain>
                  <domain includeSubdomains="true">open.bigmodel.cn</domain>
                  <domain includeSubdomains="true">dashscope.aliyuncs.com</domain>
                  <domain includeSubdomains="true">github.com</domain>
                  <domain includeSubdomains="true">objects.githubusercontent.com</domain>
              </domain-config>
          </network-security-config>
          NSEOF
          sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' \
            android/app/src/main/AndroidManifest.xml
          # Kotlin fix
          cat >> android/app/build.gradle << 'GRADLEEOF'

          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          GRADLEEOF
          SDK=$(echo $ANDROID_HOME $ANDROID_SDK_ROOT | tr ' ' '\n' | head -1)
          echo "sdk.dir=$SDK" > android/local.properties
          cd android
          echo "🔨 开始构建APK..."
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -20
          echo "--- APK size ---"
          ls -lh app/build/outputs/apk/debug/app-debug.apk || echo "APK NOT FOUND"

      - uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-full-apk
          path: app-build/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: PSP3.3
          files: app-build/android/app/build/outputs/apk/debug/app-debug.apk
          name: 小龙人 PSP3.0 全功能版
          body: |
            🐉 小龙人 PSP3.0 全功能手机APK
            - 完整Python引擎（Pyodide 0.27.5）
            - 6大数字生命体角色
            - 语音对话 + 文字聊天 + 文件分析
            - 多模型支持（DeepSeek / OpenAI / 通义千问 / 智谱GLM / Anthropic）
          prerelease: true
          fail_on_unmatched_files: false
