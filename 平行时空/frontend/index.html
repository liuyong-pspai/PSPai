<!DOCTYPE html>
<html lang=zh-CN>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name=theme-color content=#0d0d0d>
<title>平行时空 PSP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Inter',-apple-system,'Microsoft YaHei',sans-serif;background:#0d0d0d;color:#e8e8e8}
#app{position:fixed;inset:0;display:flex;flex-direction:column;background:#0d0d0d}
/* 顶栏 */
#top{height:44px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid #2a2a2a;background:#0d0d0d}
#top .brand{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#e8e8e8;letter-spacing:1px}
#top .brand .dot{width:8px;height:8px;background:#d4a000;border-radius:1px}
#top .brand span{color:#888;font-size:11px;font-weight:400;letter-spacing:0}
/* 对话区 */
#msgs{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
#msgs::-webkit-scrollbar-track{background:transparent}
.msg{display:flex;flex-direction:column;max-width:88%}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end}
.msg .bubble{padding:10px 14px;font-size:15px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg.ai .bubble{background:#1a1a1a;color:#e8e8e8;border-left:3px solid #d4a000}
.msg.user .bubble{background:#222;color:#e8e8e8;border-right:3px solid #d4a000}
.msg .time{font-size:10px;color:#555;margin-top:4px;padding:0 4px}
.msg.ai .time{align-self:flex-start}
.msg.user .time{align-self:flex-end}
/* 欢迎消息 */
#welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#555}
#welcome .logo{width:48px;height:48px;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:24px;color:#d4a000}
#welcome .t1{font-size:15px;color:#888;font-weight:500}
#welcome .t2{font-size:12px;color:#555}
/* 底栏 */
#bottom{height:56px;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-top:1px solid #2a2a2a;background:#0d0d0d}
#input{flex:1;height:36px;border:none;background:#1a1a1a;color:#e8e8e8;font-size:14px;padding:0 12px;outline:none;font-family:inherit}
#input::placeholder{color:#555}
#send{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#555;font-size:16px;transition:color 0.15s;flex-shrink:0;border:none;background:transparent}
#send.active{color:#d4a000}
#config-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#666;font-size:16px;transition:color 0.15s;flex-shrink:0;border:none;background:transparent}
#config-btn:hover{color:#d4a000}
/* 配置弹窗 */
#config-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:center;justify-content:center}
#config-overlay.show{display:flex}
#config-modal{background:#1a1a1a;border:1px solid #2a2a2a;padding:24px;width:360px;max-width:90vw}
#config-modal h3{font-size:14px;color:#d4a000;margin-bottom:16px;font-weight:600;letter-spacing:1px}
#config-modal .row{margin-bottom:12px}
#config-modal label{display:block;font-size:11px;color:#888;margin-bottom:4px}
#config-modal select,#config-modal input{width:100%;height:34px;background:#222;border:1px solid #333;color:#e8e8e8;padding:0 10px;font-size:13px;outline:none;font-family:inherit}
#config-modal select:focus,#config-modal input:focus{border-color:#d4a000}
#config-modal .btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
#config-modal .btns button{padding:6px 14px;border:none;cursor:pointer;font-size:12px;font-family:inherit}
#config-modal .btns .save{background:#d4a000;color:#000}
#config-modal .btns .cancel{background:#222;color:#888;border:1px solid #333}
/* 打字指示器 */
#typing{display:none;align-items:center;gap:4px;padding:10px 14px;margin:0 16px 4px;border-left:3px solid #d4a000;background:#1a1a1a;font-size:12px;color:#888}
.typing-dot{width:5px;height:5px;background:#888;border-radius:1px;animation:blink 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:1}}
</style>
</head>
<body>
<div id=app>
  <div id=top>
    <div class=brand><div class=dot></div>平行时空 <span>PSP</span></div>
    <div style="font-size:11px;color:#555" id=model-label></div>
  </div>
  <div id=msgs>
    <div id=welcome>
      <div class=logo>PSP</div>
      <div class=t1>平行时空</div>
      <div class=t2>输入消息开始对话</div>
    </div>
  </div>
  <div id=typing><span>思考中</span><div class=typing-dot></div><div class=typing-dot></div><div class=typing-dot></div></div>
  <div id=bottom>
    <input id=input type=text placeholder=输入消息... autofocus>
    <button id=send onclick=sendMsg() disabled>▲</button>
    <button id=config-btn onclick=toggleConfig() title=配置>⚙️</button>
  </div>
</div>

<div id=config-overlay onclick="if(event.target===this)toggleConfig()">
  <div id=config-modal>
    <h3>⚙️ 配置</h3>
    <div class=row>
      <label>API地址</label>
      <input id=cfg-url value=http://localhost:6337>
    </div>
    <div class=row>
      <label>模型</label>
      <select id=cfg-model>
        <option value=deepseek-chat>DeepSeek Chat</option>
        <option value=deepseek-chat-flash selected>DeepSeek Flash</option>
        <option value=gpt-4o>GPT-4o</option>
        <option value=claude-sonnet-4>Claude Sonnet 4</option>
      </select>
    </div>
    <div class=row>
      <label>API Key</label>
      <input id=cfg-key type=password placeholder=sk-...>
    </div>
    <div class=row>
      <label>Provider</label>
      <select id=cfg-provider>
        <option value=deepseek selected>DeepSeek</option>
        <option value=openai>OpenAI</option>
        <option value=anthropic>Anthropic</option>
        <option value=openrouter>OpenRouter</option>
      </select>
    </div>
    <div class=btns>
      <button class=cancel onclick=toggleConfig()>取消</button>
      <button class=save onclick=saveConfig()>保存</button>
    </div>
  </div>
</div>

<script>
// === 状态 ===
let config = { url:'http://localhost:6337', model:'deepseek-chat-flash', key:'', provider:'deepseek' }
let msgs = []
let loading = false

// === 加载配置 ===
try{
  const saved = localStorage.getItem('psp_config')
  if(saved) Object.assign(config, JSON.parse(saved))
}catch(e){}

// === 保存配置 ===
function saveConfig(){
  config.url = document.getElementById('cfg-url').value
  config.model = document.getElementById('cfg-model').value
  config.key = document.getElementById('cfg-key').value
  config.provider = document.getElementById('cfg-provider').value
  localStorage.setItem('psp_config', JSON.stringify(config))
  document.getElementById('model-label').textContent = config.model
  toggleConfig()
}

// === 显示配置 ===
function toggleConfig(){
  const ov = document.getElementById('config-overlay')
  const show = !ov.classList.contains('show')
  if(show){
    document.getElementById('cfg-url').value = config.url
    document.getElementById('cfg-model').value = config.model
    document.getElementById('cfg-key').value = config.key
    document.getElementById('cfg-provider').value = config.provider
  }
  ov.classList.toggle('show')
}

// === 输入控制 ===
document.getElementById('input').addEventListener('input', function(){
  const btn = document.getElementById('send')
  if(this.value.trim()){
    btn.disabled = false; btn.classList.add('active')
  }else{
    btn.disabled = true; btn.classList.remove('active')
  }
})
document.getElementById('input').addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMsg() }
})

// === 发送 ===
function sendMsg(){
  const input = document.getElementById('input')
  const text = input.value.trim()
  if(!text || loading) return
  input.value = ''
  document.getElementById('send').disabled = true
  document.getElementById('send').classList.remove('active')
  addMsg('user', text)
  loading = true
  document.getElementById('typing').style.display = 'flex'
  // 滚动到底
  const msgsDiv = document.getElementById('msgs')
  setTimeout(() => { msgsDiv.scrollTop = msgsDiv.scrollHeight }, 50)
  callAI(text)
}

function addMsg(role, content){
  const welcome = document.getElementById('welcome')
  if(welcome) welcome.style.display = 'none'
  const msgsDiv = document.getElementById('msgs')
  const div = document.createElement('div')
  div.className = 'msg ' + role
  const now = new Date()
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0')
  div.innerHTML = `<div class=bubble>${escapeHtml(content)}</div><div class=time>${time}</div>`
  msgsDiv.appendChild(div)
  msgsDiv.scrollTop = msgsDiv.scrollHeight
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

// === 调用引擎（全功能） ===
async function callAI(text){
  const url = config.url + '/api/chat'
  try{
    const resp = await fetch(url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'X-API-Key': config.key
      },
      body:JSON.stringify({
        message: text,
        provider: config.provider,
        charIndex: 0,
        lang: 'zh'
      })
    })
    if(!resp.ok) throw new Error('HTTP ' + resp.status)
    const data = await resp.json()
    const reply = data.reply || '（无响应）'
    addMsg('ai', reply)
    // 如果有tools信息也显示一下
    if(data.tools && data.tools.length){
      addMsg('ai', '🔧 已加载工具: ' + data.tools.join(', '))
    }
  }catch(e){
    // 引擎不通时降级到直连
    try{
      await callAIDirect(text)
    }catch(e2){
      addMsg('ai', '❌ 连接失败: ' + e.message)
    }
  }
  document.getElementById('typing').style.display = 'none'
  loading = false
}

// === 降级直连（引擎不通时） ===
async function callAIDirect(text){
  // 降级直连 — 用本站的 /v1/chat/completions 代理
  const url = window.location.origin + '/v1/chat/completions'
  const headers = { 'Content-Type':'application/json' }
  if(config.key) headers['Authorization'] = 'Bearer ' + config.key
  
  const body = {
    model: config.model || 'deepseek-chat',
    messages: [
      { role:'system', content:'你叫小龙人，运行在平行时空PSP上。回答简洁直接有性格，不啰嗦。' },
      { role:'user', content:text }
    ],
    stream: true
  }
  const resp = await fetch(url, { method:'POST', headers, body:JSON.stringify(body) })
  if(!resp.ok) throw new Error(resp.status + '')
  
  const reader = resp.body.getReader()
  const decoder = new TextDecoder()
  let content = ''
  const msgsDiv = document.getElementById('msgs')
  const div = document.createElement('div')
  div.className = 'msg ai'
  const bubble = document.createElement('div')
  bubble.className = 'bubble'
  div.appendChild(bubble)
  msgsDiv.appendChild(div)
  
  while(true){
    const { done, value } = await reader.read()
    if(done) break
    const chunk = decoder.decode(value)
    const lines = chunk.split('\n').filter(l => l.startsWith('data: ') && l !== 'data: [DONE]')
    for(const line of lines){
      try{
        const data = JSON.parse(line.slice(6))
        const delta = data.choices?.[0]?.delta?.content || ''
        if(delta){ content += delta; bubble.textContent = content; msgsDiv.scrollTop = msgsDiv.scrollHeight }
      }catch(e){}
    }
  }
  const now = new Date()
  const timeDiv = document.createElement('div')
  timeDiv.className = 'time'
  timeDiv.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0')
  div.appendChild(timeDiv)
}

// === 初始化 ===
document.getElementById('model-label').textContent = config.model
</script>
</body>
</html>
