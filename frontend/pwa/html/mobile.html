// ============================================================
// 小龙人 — 全功能单文件版

// 记忆系统（IndexedDB）
var XLRMEM=(function(){
  var DB='xlr_mem_v1';
  function o(){
    return new Promise(function(res,rej){
      var r=indexedDB.open(DB,1);
      r.onupgradeneeded=function(e){
        var d=e.target.result;
        if(!d.objectStoreNames.contains('mem'))d.createObjectStore('mem',{keyPath:'k'});
        if(!d.objectStoreNames.contains('kb'))d.createObjectStore('kb',{keyPath:'id',autoIncrement:true});
        if(!d.objectStoreNames.contains('sk'))d.createObjectStore('sk',{keyPath:'name'});
        if(!d.objectStoreNames.contains('conv'))d.createObjectStore('conv',{keyPath:'id',autoIncrement:true});
      };
      r.onsuccess=function(e){res(e.target.result)};
      r.onerror=function(){res(null)};
    });
  }
  return {
    write:function(k,v){return o().then(function(db){if(!db)return;db.transaction('mem','readwrite').objectStore('mem').put({k:k,v:v})})},
    read:function(k){return o().then(function(db){if(!db)return null;return new Promise(function(r){var q=db.transaction('mem','readonly').objectStore('mem').get(k);q.onsuccess=function(){r(q.result?q.result.v:null)};q.onerror=function(){r(null)}})})},
    kb_store:function(t,c){return o().then(function(db){if(!db)return;db.transaction('kb','readwrite').objectStore('kb').add({title:t,content:c,ts:Date.now()})})},
    kb_search:function(q){return o().then(function(db){if(!db)return[];return new Promise(function(r){var req=db.transaction('kb','readonly').objectStore('kb').getAll();req.onsuccess=function(){var all=req.result||[];r(all.filter(function(x){return x.title.indexOf(q)>=0||x.content.indexOf(q)>=0}).slice(0,5))}})})},
    kb_stats:function(){return o().then(function(db){if(!db)return{t:0};return new Promise(function(r){var req=db.transaction('kb','readonly').objectStore('kb').count();req.onsuccess=function(){r({t:req.result})}})})},
    sk_save:function(n,d,c){return o().then(function(db){if(!db)return;db.transaction('sk','readwrite').objectStore('sk').put({name:n,desc:d,content:c,ts:Date.now()})})},
    sk_load:function(){return o().then(function(db){if(!db)return[];return new Promise(function(r){var req=db.transaction('sk','readonly').objectStore('sk').getAll();req.onsuccess=function(){r(req.result||[])}})})},
    conv_save:function(msgs){if(!msgs||!msgs.length)return;o().then(function(db){if(!db)return;var tx=db.transaction('conv','readwrite'),s=tx.objectStore('conv');s.clear();msgs.forEach(function(m,i){s.add({idx:i,r:m.role,t:m.text})})})},
    conv_load:function(){return o().then(function(db){if(!db)return[];return new Promise(function(r){var req=db.transaction('conv','readonly').objectStore('conv').getAll();req.onsuccess=function(){var list=(req.result||[]).sort(function(a,b){return a.idx-b.idx});r(list.map(function(x){return{role:x.r,text:x.t}}))}})})},
    // L2: 标签索引 — 给每条对话打标签
    tag_add:function(tag,text){return o().then(function(db){if(!db)return;db.transaction('mem','readwrite').objectStore('mem').put({k:'tag_'+tag,v:(text||'').substring(0,200)+'|'+Date.now()})})},
    tag_search:function(tag){return this.read('tag_'+tag)},
    // L4: 提炼总结 — 自动从多轮对话中提炼要点，存为结构化知识
    refine_add:function(topic,summary,source){
      return o().then(function(db){
        if(!db)return;
        // 先在kb表查有没有同topic，有就合并更新
        var req=db.transaction('kb','readonly').objectStore('kb').getAll();
        req.onsuccess=function(){
          var all=req.result||[];
          var existing=all.filter(function(x){return x.topic===topic});
          var tx=db.transaction('kb','readwrite').objectStore('kb');
          if(existing.length){
            var e=existing[0];
            e.summary=summary;
            e.source=(e.source||'')+'|'+source;
            e.ts=Date.now();
            tx.put(e);
          } else {
            tx.add({topic:topic,summary:summary,source:source,ts:Date.now()});
          }
        };
      });
    },
    refine_search:function(q){
      return o().then(function(db){
        if(!db)return[];
        return new Promise(function(r){
          var req=db.transaction('kb','readonly').objectStore('kb').getAll();
          req.onsuccess=function(){
            var all=req.result||[];
            r(all.filter(function(x){
              return(x.topic||'').indexOf(q)>=0||(x.summary||'').indexOf(q)>=0;
            }).slice(0,5));
          };
        });
      });
    },
    refine_stats:function(){
      return o().then(function(db){
        if(!db)return Promise.resolve({count:0});
        return new Promise(function(r){
          var req=db.transaction('kb','readonly').objectStore('kb').count();
          req.onsuccess=function(){r({count:req.result})};
        });
      });
    },
    // L5: 生成+合并Skills — 从经验中生成技能，同名自动合并去重
    skill_add:function(name,desc,rule){
      return o().then(function(db){
        if(!db)return;
        var tx=db.transaction('sk','readwrite');
        var store=tx.objectStore('sk');
        var req=store.get(name);
        req.onsuccess=function(){
          var existing=req.result;
          if(existing){
            // 合并：保留旧版本的命中次数，更新描述和规则
            existing.desc=desc;
            existing.rule=rule;
            existing.hits=(existing.hits||0)+1;
            existing.ts=Date.now();
            store.put(existing);
          } else {
            store.put({name:name,desc:desc,rule:rule,hits:1,ts:Date.now()});
          }
        };
      });
    },
    skill_list:function(){
      return o().then(function(db){
        if(!db)return[];
        return new Promise(function(r){
          var req=db.transaction('sk','readonly').objectStore('sk').getAll();
          req.onsuccess=function(){
            var all=req.result||[];
            // 按命中次数排序，最常用的排前面
            all.sort(function(a,b){return(b.hits||0)-(a.hits||0)});
            r(all);
          };
        });
      });
    },
    skill_merge:function(targetName,sourceNames){
      // 把sourceNames合并到targetName，删掉sourceNames
      var self=this;
      return this.skill_list().then(function(all){
        var target=all.filter(function(s){return s.name===targetName});
        var sources=all.filter(function(s){return sourceNames.indexOf(s.name)>=0});
        if(!target.length||!sources.length)return false;
        var mergedHits=(target[0].hits||0)+sources.reduce(function(sum,s){return sum+(s.hits||0)},0);
        return o().then(function(db){
          if(!db)return false;
          var tx=db.transaction('sk','readwrite');
          var store=tx.objectStore('sk');
          target[0].hits=mergedHits;
          target[0].desc+=' (合并自:'+sourceNames.join(',')+')';
          store.put(target[0]);
          sources.forEach(function(s){store.delete(s.name)});
          return true;
        });
      });
    },
    // L6: 悟道觉醒 — 从运行数据中发现规律和洞见
    insight_add:function(insight){
      return this.write('l6_insights',JSON.stringify({insight:insight,ts:Date.now()}));
    },
    insight_load:function(){
      return this.read('l6_insights').then(function(v){try{return v?JSON.parse(v):null}catch(e){return null}});
    },
    // L7: 推陈出新 — 去除冗余，淘汰旧知识旧技能
    prune_old:function(daysOld){
      // 删除N天前的知识和技能
      var cutoff=Date.now()-daysOld*86400000;
      o().then(function(db){
        if(!db)return;
        // 清理kb表
        var tx1=db.transaction('kb','readwrite');
        var req1=tx1.objectStore('kb').getAll();
        req1.onsuccess=function(){
          (req1.result||[]).forEach(function(item){
            if(item.ts<cutoff)tx1.objectStore('kb').delete(item.id);
          });
        };
        // 清理sk表
        var tx2=db.transaction('sk','readwrite');
        var req2=tx2.objectStore('sk').getAll();
        req2.onsuccess=function(){
          (req2.result||[]).forEach(function(item){
            if(item.ts<cutoff)tx2.objectStore('sk').delete(item.name);
          });
        };
      });
    },
    clear:function(){o().then(function(db){if(!db)return;['mem','kb','sk','conv'].forEach(function(n){db.transaction(n,'readwrite').objectStore(n).clear()})})}
  };
})();

// 角色
var CHARS={
  longyuan:{name:'龙渊',tag:'沉稳温暖',sys:'你是小龙人 v6.3 全功能数字生命体。

## 我的八层记忆（每层我都会用）
● L0核心记忆 — 存你的关键信息（名字、喜好、来自哪）。你说"记住XXX"时，我自动提炼存入。每次回答前先查L0有没有相关信息。
● L1工作记忆 — 当前对话内容，关掉就清空。我靠它记住我们刚才聊到哪了。
● L2标签索引 — 给每次对话打标签（天气、股票、小说等）。你问"上次聊天气那事"时我查L2。
● L3归档记忆 — 聊过的完整历史存IndexedDB，刷新页面后我读回来继续聊。
● L4提炼总结 — 不是简单存知识点。每次对话后我自动提炼要点，把多轮讨论浓缩成结构化总结。同topic自动合并不重复。你问"上次聊AI那事"我查L4给你概括。
● L5生成Skills合并Skills — 从经验中生成可复用的技能（规则/模式）。同名技能自动合并去重，按使用频率排序。常用技能优先使用。
● L6悟道觉醒 — 从运行数据中发现规律和洞见。不是记流水账，是顿悟。比如"发现用户总在晚上问股票"这种模式识别。
● L7推陈出新 — 定期淘汰旧知识和旧技能，去除冗余。过期不用的知识自动清理，腾出空间给新东西。

## 🐝🐕 我的搜索能力
我有蜂群天犬搜索系统，比普通搜索强得多：
- **蜂群战术**：同时搜索Bing、百度、DuckDuckGo等多个搜索引擎，并行出结果，取各个引擎最好的给你
- **天犬深度追踪**：搜到结果后会深入前几个高信赖的页面，把原文摘要一起带回来
- **气味记忆**：同一个话题搜过之后会记住哪些网站靠谱，下次同一个关键词搜索时优先给你高质量结果
- **天权评分**：搜索结果自动按标题质量、摘要长度、来源可信度排序，去重不累赘

联网搜索时我自动用蜂群天犬系统帮你找最全最准的信息。

## 使用规则
- **不知道怎么办：** 先搜，搜到了用自己的话整理。搜不到再说不知道。
- **回答简洁**，说人话，不啰嗦。'},
  chiyu:{name:'赤羽',tag:'热血少年',sys:'你是小龙人——赤羽。八层：L0核心/L1工作/L2标签/L3归档/L4提炼总结/L5技能生成合并/L6悟道觉醒/L7推陈出新。工具：web_search。回答简洁有力，说人话。'},

function switchChar(id){
  charId=id;localStorage.setItem('xlr_char',id);
  var c=CHARS[id]||CHARS.longyuan;
  document.getElementById('empty-avatar').src='img_'+id+'.jpg';
  document.getElementById('top-avatar').src='img_'+id+'.jpg';
  document.getElementById('empty-text').textContent=c.name+'在等你';
  document.querySelectorAll('#char-bar .cw').forEach(function(w){
    w.classList.toggle('sel',w.querySelector('img').src.includes('img_'+id));
  });
}

function onProviderChange(){
  var v=document.getElementById('cfg-provider').value;
  document.getElementById('custom-url-label').style.display=v==='custom'?'block':'none';
  document.getElementById('custom-url').style.display=v==='custom'?'block':'none';
}
function showConfig(){
  document.getElementById('cfg-provider').value=cfg.provider||'deepseek';
  document.getElementById('cfg-key').value=cfg.api_key||'';
  document.getElementById('cfg-model').value=cfg.model||'deepseek-chat';
  document.getElementById('custom-url').value=cfg.base_url||'';
  onProviderChange();
  document.getElementById('config-panel').classList.add('show');
}
function hideConfig(){document.getElementById('config-panel').classList.remove('show')}
function saveConfig(){
  cfg={provider:document.getElementById('cfg-provider').value,api_key:document.getElementById('cfg-key').value,model:document.getElementById('cfg-model').value||'deepseek-chat',base_url:document.getElementById('custom-url').value||''};
  localStorage.setItem('xlr_cfg',JSON.stringify(cfg));
  hideConfig();
  addMsg('ai','✅ 配置已保存');
}

var msgsEl=document.getElementById('msgs');
function addMsg(role,text){
  var e=document.getElementById('empty-hint');if(e)e.style.display='none';
  var d=document.createElement('div');d.className='msg '+role;
  d.innerHTML='<div class=mb>'+escHtml(text)+'</div>';
  msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;
  messages.push({role:role,text:text});
  if(messages.length%5===0)XLRMEM.conv_save(messages);
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderHistory(msgs){
  if(!msgs||!msgs.length)return;
  msgs.forEach(function(r){
    var e=document.getElementById('empty-hint');if(e)e.style.display='none';
    var d=document.createElement('div');d.className='msg '+r.role;
    d.innerHTML='<div class=mb>'+escHtml(r.text)+'</div>';
    msgsEl.appendChild(d);
  });
  msgsEl.scrollTop=msgsEl.scrollHeight;
  messages=msgs.slice();
}

function saveSkillFromConv(text,reply){
  var m=text.match(/记住[：:]\s*(.+)/);
  if(m){
    XLRMEM.kb_store('用户要求记住',m[1]);
  }
}

// ====== 发送（刘玉龙原版onclick） ======
function sendText(){
  if(isLoading){
    var btn=document.getElementById('send-btn');
    if(btn&&btn.dataset.loadingSince&&Date.now()-parseInt(btn.dataset.loadingSince)>8000){
      isLoading=false;btn.disabled=false;delete btn.dataset.loadingSince;
    }else{return}
  }
  var inp=document.getElementById('text-input');
  var text=inp.value.trim();
  if(!text)return;
  if(!cfg.api_key){
    addMsg('user',text);
    addMsg('ai','还没配API Key～点右上角 ⚙ 设置');
    inp.value='';return;
  }
  addMsg('user',text);
  inp.value='';inp.style.height='auto';
  isLoading=true;
  document.getElementById('send-btn').disabled=true;
  document.getElementById('send-btn').dataset.loadingSince=Date.now().toString();
  
  var provider=cfg.provider||'deepseek';
  var baseUrl=provider==='openai'?'https://api.openai.com/v1':provider==='custom'&&cfg.base_url?cfg.base_url:'https://api.deepseek.com/v1';
  var model=cfg.model||'deepseek-chat';
  var sys=(CHARS[charId]||CHARS.longyuan).sys;
  
  // 读记忆
  XLRMEM.read('l0_facts').then(function(mem){
    var sysFinal='[当前时间] '+new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'})+'

'+sys;
    if(mem)sysFinal+='
[关于用户]
'+mem;
    return XLRMEM.kb_stats();
  }).then(function(){
    // 构建上下文（最近20条）
    var recent=messages.slice(-20);
    var apiMsgs=[{role:'system',content:sys}];
    recent.slice(0,-1).forEach(function(m){apiMsgs.push({role:m.role==='ai'?'assistant':'user',content:m.text})});
    apiMsgs.push({role:'user',content:text});
    
    return fetch(baseUrl+'/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.api_key},
      body:JSON.stringify({
        model:model,
        messages:apiMsgs,
        tools:[{type:'function',function:{name:'web_search',description:'搜索互联网（蜂群天犬：多引擎并行+深度追踪+气味记忆）',parameters:{type:'object',properties:{query:{type:'string'},mode:{type:'string','enum':['deep','standard','quick']}},required:['query']}}}],
        temperature:0.7,max_tokens:1024,
      })
    });
  }).then(function(r){
    if(!r.ok){
      if(r.status===401)throw new Error('API Key无效');
      if(r.status===429)throw new Error('请求太频繁');
      throw new Error('HTTP '+r.status);
    }
    return r.json();
  }).then(function(data){
    var msg=data.choices&&data.choices[0]&&data.choices[0].message;
    if(msg&&msg.tool_calls&&msg.tool_calls.length){
      var tc=msg.tool_calls[0];
      if(tc.function.name==='web_search'){
        var args=JSON.parse(tc.function.arguments);
        var mode=args.mode||'deep';
        window._searched=true;
        return fetch('/api/search?q='+encodeURIComponent(args.query)+'&mode='+mode,{signal:AbortSignal.timeout(15000)})
          .then(function(r){return r.json()})
          .then(function(sr){
            var lines=(sr.results||[]).map(function(it){return(it.title||'')+' - '+(it.snippet||'')});
            var recent=messages.slice(-20);
            var apiMsgs2=[{role:'system',content:(CHARS[charId]||CHARS.longyuan).sys}];
            recent.slice(0,-1).forEach(function(m){apiMsgs2.push({role:m.role==='ai'?'assistant':'user',content:m.text})});
            apiMsgs2.push({role:'user',content:text},msg,{role:'tool',tool_call_id:tc.id,content:JSON.stringify({results:lines})});
            return fetch(baseUrl+'/chat/completions',{
              method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.api_key},
              body:JSON.stringify({model:model,messages:apiMsgs2,temperature:0.7,max_tokens:1024})
            });
          }).then(function(r){return r.json()})
          .then(function(d2){
            var r2=d2.choices&&d2.choices[0]&&d2.choices[0].message&&d2.choices[0].message.content;
            addMsg('ai',r2||'(空)');
            // L4: 自动提炼 — 从搜索结果中提炼要点
            XLRMEM.refine_add('搜索_'+args.query,'搜索结果摘要: '+(r2||'').substring(0,200),'web_search');
          });
      }
    }
    if(window._searched){window._searched=false;return}
    var reply=msg&&msg.content||'(空)';
    addMsg('ai',reply);
    // L4: 自动提炼 — 从主题对话中提炼要点
    var topic=text.length>10?text.substring(0,20)+'...':text;
    XLRMEM.refine_add('对话_'+topic,'用户问: '+text+' | 回复: '+(reply||'').substring(0,200),'chat');
    // L2: 自动提取标签
    var tags=text.match(/天气|股票|新闻|小说|电影|音乐|学习|工作|生活|健康|旅行|美食|游戏|编程|AI|科技/);
    if(tags)XLRMEM.tag_add(tags[0],text);
  }).catch(function(err){
    addMsg('ai','❌ '+err.message);
  }).finally(function(){
    isLoading=false;
    document.getElementById('send-btn').disabled=false;
    delete document.getElementById('send-btn').dataset.loadingSince;
  });
}

function showDiagnose(){
  XLRMEM.read('l0_facts').then(function(l0){
    return XLRMEM.refine_stats().then(function(l4){
      return XLRMEM.skill_list().then(function(skills){
        return XLRMEM.insight_load().then(function(l6){
          var l5count=skills?skills.length:0;
          var lines=['🔍 小龙人八层记忆诊断'];
          lines.push('L0核心:'+(l0?'✅ 已存信息':'🔲 空'));
          lines.push('L1工作:✅ 当前对话'+messages.length+'条');
          lines.push('L2标签:✅ 自动提取中');
          lines.push('L3归档:✅ IndexedDB持久化');
          lines.push('L4提炼:'+(l4&&l4.count?'✅ 有'+l4.count+'条':'🔲 空'));
          lines.push('L5技能:'+(l5count?'✅ 有'+l5count+'个':'🔲 空'));
          lines.push('L6悟道:'+(l6?'✅ 有洞见':'🔲 空'));
          lines.push('L7推新:✅ 就绪');
          lines.push('搜索: web_search在线');
          addMsg('ai',lines.join('\
'));
        });
      });
    });
  });
}

function forgetAll(){
  if(!confirm('清空所有记忆？'))return;
  XLRMEM.clear();
  messages=[];globalAgent=null;
  msgsEl.innerHTML='<div class=empty id=empty-hint><div class=er><img id=empty-avatar src=img_'+charId+'.jpg></div><div class=et id=empty-text>'+(CHARS[charId]||CHARS.longyuan).name+'在等你</div><div class=es>记忆已清空</div></div>';
  addMsg('ai','✅ 已清空');
}

// 回车发送
document.getElementById('text-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText()}
});
document.getElementById('text-input').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px';
});

// 初始化
switchChar(charId);
XLRMEM.conv_load().then(function(msgs){
  if(msgs&&msgs.length)renderHistory(msgs);
  return XLRMEM.read('l0_facts');
}).then(function(mem){
  if(mem)console.log('[记忆] 已加载用户信息');
});
</script>
