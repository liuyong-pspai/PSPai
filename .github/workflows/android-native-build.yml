name: Build Android Native APK

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-native-build.yml'
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          set +e
          ANDROID_HOME=$ANDROID_HOME ./gradlew assembleDebug --no-daemon --console=plain --stacktrace 2>&1 | tee build.log
          GRADLE_EXIT=${PIPESTATUS[0]}
          echo "GRADLE_EXIT_CODE=$GRADLE_EXIT"
          exit $GRADLE_EXIT

      - name: Show build output
        if: always()
        run: |
          echo "=== BUILD LOG (last 50 lines) ==="
          tail -50 /home/runner/work/PSPai/PSPai/android/build.log 2>/dev/null || echo "No build.log at expected path"
          tail -50 android/build.log 2>/dev/null || echo "No build.log at relative path"
          echo "=== APK SEARCH ==="
          find . -name "*.apk" -type f -ls 2>/dev/null || echo "No APK found"
          echo "=== BUILD OUTPUTS ==="
          find android/app/build/outputs -type f 2>/dev/null || echo "No outputs"

      - name: Upload artifacts (APK + logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xiaolongren-build-output
          path: |
            android/app/build/outputs/
            android/build.log
          if-no-files-found: warn
